<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trợ Lý Đi Buồng Lâm Sàng</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (To compile JSX in browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Ẩn thanh cuộn nhưng vẫn cho phép cuộn */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    /* Padding an toàn cho các dòng điện thoại tai thỏ/không viền */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
  </style>
</head>
<body class="bg-slate-800 flex justify-center h-screen overflow-hidden m-0">
  
  <div id="root" class="w-full max-w-md h-full bg-slate-50 relative overflow-hidden flex flex-col shadow-2xl"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- ICON COMPONENTS (Nhúng trực tiếp để chạy offline) ---
    const IconActivity = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>);
    const IconClipboardList = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"></rect><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><path d="M12 11h4"></path><path d="M12 16h4"></path><path d="M8 11h.01"></path><path d="M8 16h.01"></path></svg>);
    const IconBrainCircuit = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 4.5a2.5 2.5 0 0 0-4.96-.46 2.5 2.5 0 0 0-1.98 3 2.5 2.5 0 0 0-1.32 4.24 3 3 0 0 0 .34 5.58 2.5 2.5 0 0 0 2.96 3.08 2.5 2.5 0 0 0 4.91.05L12 20V4.5Z"></path><path d="M16 8V5c0-1.1.9-2 2-2"></path><path d="M12 13h4"></path><path d="M12 17h6"></path><path d="M21 9h-4"></path><path d="M22 13h-2"></path><path d="M21 17h-3"></path></svg>);
    const IconSave = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>);
    const IconTrash2 = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" x2="10" y1="11" y2="17"></line><line x1="14" x2="14" y1="11" y2="17"></line></svg>);
    const IconPlus = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>);
    const IconChevronDown = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>);
    const IconChevronUp = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>);
    const IconAlertTriangle = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>);


    // --- ỨNG DỤNG CHÍNH ---
    function ClinicalRoundsAssistant() {
      const [activeTab, setActiveTab] = useState('sbar');

      return (
        <React.Fragment>
          {/* Header */}
          <header className="bg-blue-700 text-white p-4 shadow-md z-10 shrink-0">
            <h1 className="text-xl font-bold flex items-center gap-2">
              <IconActivity size={24} />
              Trợ Lý Đi Buồng
            </h1>
            <p className="text-blue-100 text-sm mt-1">Giao bệnh nhanh - Ra quyết định chuẩn</p>
          </header>

          {/* Main Content */}
          <main className="flex-grow p-4 overflow-y-auto pb-24 scrollbar-hide">
            {activeTab === 'sbar' && <SBARModule />}
            {activeTab === 'protocols' && <ProtocolModule />}
            {activeTab === 'pimping' && <PimpingModule />}
          </main>

          {/* Bottom Navigation */}
          <nav className="bg-white border-t border-slate-200 absolute bottom-0 w-full flex justify-around p-2 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] z-20 shrink-0 pb-safe">
            <NavButton 
              icon={<IconClipboardList size={24} />}
              label="SBAR Giao Bệnh" 
              isActive={activeTab === 'sbar'} 
              onClick={() => setActiveTab('sbar')} 
            />
            <NavButton 
              icon={<IconActivity size={24} />} 
              label="Phác Đồ Nhanh" 
              isActive={activeTab === 'protocols'} 
              onClick={() => setActiveTab('protocols')} 
            />
            <NavButton 
              icon={<IconBrainCircuit size={24} />} 
              label="Tư Duy (Anki)" 
              isActive={activeTab === 'pimping'} 
              onClick={() => setActiveTab('pimping')} 
            />
          </nav>
        </React.Fragment>
      );
    }

    function NavButton({ icon, label, isActive, onClick }) {
      return (
        <button 
          onClick={onClick}
          className={`flex flex-col items-center p-2 rounded-lg transition-colors w-1/3 ${
            isActive ? 'text-blue-700 font-semibold' : 'text-slate-500 hover:text-blue-500'
          }`}
        >
          <div className={`${isActive ? 'scale-110' : ''} transition-transform`}>
            {icon}
          </div>
          <span className="text-xs mt-1">{label}</span>
        </button>
      );
    }

    /* ==========================================
       MODULE 1: SBAR HANDOVER
       ========================================== */
    function SBARModule() {
      const [patients, setPatients] = useState([
        {
          id: 1,
          bed: '12',
          name: 'Ngô Văn B',
          age: '65',
          situation: 'Bệnh nhân đang suy hô hấp cấp, nhịp thở 35 l/p, SpO2 88% (oxy mask túi 10L/p). Bệnh nhân bắt đầu lơ mơ, mệt cơ hô hấp.',
          background: 'Tiền sử Hen phế quản. Khởi phát ho khạc đàm vàng 2 ngày. Đã phun khí dung Salbutamol 3 lần + tiêm TM Methylprednisolone 40mg cách đây 1 giờ nhưng không đáp ứng.',
          assessment: 'Khám: Phổi ran rít ngáy 2 phế trường, co kéo cơ hô hấp phụ nhiều. Khí máu (15p trước): pH 7.25, PaCO2 65, PaO2 55. Đánh giá: Cơn hen phế quản cấp nguy kịch, toan hô hấp.',
          recommendation: 'Đề xuất: Đặt nội khí quản thở máy xâm nhập ngay. Đã chuẩn bị sẵn khay NKQ, Midazolam và thuốc dãn cơ. Xin ý kiến Trưởng khoa tiến hành.',
          watchOut: 'Canh sát tri giác và SpO2 mỗi 15 phút. Báo động ngay nếu ngưng thở hoặc SpO2 < 85%. Sẵn sàng bóp bóng.'
        }
      ]);
      const [currentForm, setCurrentForm] = useState({
        id: null, bed: '', name: '', age: '', situation: '', background: '', assessment: '', recommendation: '', watchOut: ''
      });
      const [isEditing, setIsEditing] = useState(false);

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setCurrentForm(prev => ({ ...prev, [name]: value }));
      };

      const savePatient = () => {
        if (!currentForm.name || !currentForm.bed) return alert('Vui lòng nhập Tên và Số giường!');
        if (currentForm.id) {
          setPatients(patients.map(p => p.id === currentForm.id ? currentForm : p));
        } else {
          setPatients([...patients, { ...currentForm, id: Date.now() }]);
        }
        resetForm();
      };

      const editPatient = (patient) => {
        setCurrentForm(patient);
        setIsEditing(true);
      };

      const deletePatient = (id) => {
        setPatients(patients.filter(p => p.id !== id));
      };

      const resetForm = () => {
        setCurrentForm({ id: null, bed: '', name: '', age: '', situation: '', background: '', assessment: '', recommendation: '', watchOut: '' });
        setIsEditing(false);
      };

      return (
        <div className="space-y-6 pb-6">
          {/* Patient List */}
          {patients.length > 0 && !isEditing && (
            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
              <button 
                onClick={() => setIsEditing(true)}
                className="flex-shrink-0 flex items-center justify-center w-12 h-12 bg-blue-100 text-blue-700 rounded-full shadow-sm"
              >
                <IconPlus size={24} />
              </button>
              {patients.map(p => (
                <button 
                  key={p.id} 
                  onClick={() => editPatient(p)}
                  className="flex-shrink-0 px-4 py-2 bg-white border border-slate-200 rounded-full shadow-sm text-sm font-medium text-slate-700 whitespace-nowrap"
                >
                  G.{p.bed} - {p.name}
                </button>
              ))}
            </div>
          )}

          {/* SBAR Form */}
          {(isEditing || patients.length === 0) && (
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="bg-slate-50 border-b border-slate-200 p-3 flex justify-between items-center">
                <h2 className="font-semibold text-slate-700">
                  {currentForm.id ? 'Sửa thông tin ca bệnh' : 'Thêm ca bệnh mới'}
                </h2>
                {patients.length > 0 && (
                  <button onClick={resetForm} className="text-slate-400 hover:text-slate-600">Hủy</button>
                )}
              </div>
              
              <div className="p-4 space-y-4">
                <div className="flex gap-2">
                  <input type="text" name="bed" placeholder="Giường..." value={currentForm.bed} onChange={handleInputChange} className="w-1/4 p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" />
                  <input type="text" name="name" placeholder="Họ tên BN..." value={currentForm.name} onChange={handleInputChange} className="w-2/4 p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" />
                  <input type="text" name="age" placeholder="Tuổi..." value={currentForm.age} onChange={handleInputChange} className="w-1/4 p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" />
                </div>

                <div className="space-y-3">
                  <SBARField letter="S" title="Situation (Tình huống)" placeholder="Vấn đề cấp bách ngay lúc này là gì?" name="situation" value={currentForm.situation} onChange={handleInputChange} color="bg-red-50 text-red-700 border-red-200" />
                  <SBARField letter="B" title="Background (Bối cảnh/Tiền sử)" placeholder="Tiền sử bệnh, can thiệp đã làm?" name="background" value={currentForm.background} onChange={handleInputChange} color="bg-orange-50 text-orange-700 border-orange-200" />
                  <SBARField letter="A" title="Assessment (Đánh giá)" placeholder="Khám LS, CLS nổi bật? Chẩn đoán sơ bộ?" name="assessment" value={currentForm.assessment} onChange={handleInputChange} color="bg-blue-50 text-blue-700 border-blue-200" />
                  <SBARField letter="R" title="Recommendation (Đề xuất)" placeholder="Bạn muốn xin ý kiến Trưởng khoa điều gì?" name="recommendation" value={currentForm.recommendation} onChange={handleInputChange} color="bg-green-50 text-green-700 border-green-200" />
                  <SBARField letter="W" title="Watch-out (Cần canh/Theo dõi)" placeholder="Dấu hiệu sinh tồn nào cần báo động ngay?" name="watchOut" value={currentForm.watchOut} onChange={handleInputChange} color="bg-purple-50 text-purple-700 border-purple-200" />
                </div>

                <div className="flex gap-2 pt-2">
                  <button onClick={savePatient} className="flex-1 bg-blue-600 text-white p-3 rounded-lg font-medium flex items-center justify-center gap-2 hover:bg-blue-700">
                    <IconSave size={18} /> Lưu Ca Bệnh
                  </button>
                  {currentForm.id && (
                    <button onClick={() => deletePatient(currentForm.id)} className="p-3 bg-red-100 text-red-600 rounded-lg hover:bg-red-200">
                      <IconTrash2 size={18} />
                    </button>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function SBARField({ letter, title, placeholder, name, value, onChange, color }) {
      return (
        <div className={`border rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-opacity-50 ${color.replace('bg-', 'focus-within:ring-').split(' ')[0]}`}>
          <div className={`px-3 py-1.5 flex items-center gap-2 border-b ${color}`}>
            <span className="font-bold text-lg">{letter}</span>
            <span className="font-medium text-sm">{title}</span>
          </div>
          <textarea name={name} value={value} onChange={onChange} placeholder={placeholder} rows={3} className="w-full p-3 text-sm focus:outline-none resize-none bg-white" />
        </div>
      );
    }

    /* ==========================================
       MODULE 2: QUICK PROTOCOLS
       ========================================== */
    function ProtocolModule() {
      const [mainMode, setMainMode] = useState('recognition');
      const [selectedDept, setSelectedDept] = useState('all');

      const departments = [
        { id: 'all', label: 'Tất cả', icon: '🏥' },
        { id: 'emergency', label: 'Cấp cứu', icon: '🚨' },
        { id: 'infectious', label: 'Nhiễm', icon: '🦠' },
        { id: 'respiratory', label: 'Hô hấp', icon: '🫁' },
        { id: 'neuro', label: 'Thần kinh', icon: '🧠' },
        { id: 'cardio', label: 'Tim mạch', icon: '❤️' },
        { id: 'icu', label: 'Hồi sức', icon: '⚙️' },
      ];

      const recognitionData = [
        {
          dept: 'emergency', type: 'danger', title: 'Nhận diện cấp cứu toàn viện',
          bullets: [
            'ABCDE bất ổn: ngưng thở, tím tái, SpO2 < 92%, rối loạn nhịp thở, sốc, hôn mê/co giật.',
            'Tụt huyết áp, mạch không bắt được, HA không đo được, CRT kéo dài, chi lạnh, da nổi bông.',
            'Bất kỳ bệnh nào có suy hô hấp, suy tuần hoàn, rối loạn tri giác đều đưa vào nhóm cấp cứu trước khi chia khoa.'
          ],
          emergency: ['Sốc phản vệ', 'Sốc nhiễm khuẩn', 'Suy hô hấp cấp', 'Co giật kéo dài', 'Tay chân miệng độ 3-4', 'Hen cấp nguy kịch']
        },
        {
          dept: 'infectious', type: 'warning', title: 'Khoa Nhiễm',
          bullets: [
            'Sốt kèm ban, loét miệng, dấu nhiễm trùng, nghi bệnh truyền nhiễm hoặc bệnh có nguy cơ thành dịch.',
            'Tay chân miệng: giật mình, sốt ≥ 39°C, nôn nhiều, lừ đừ, mạch nhanh, tăng HA, thở nhanh là dấu hiệu chuyển nặng.',
            'Sốt xuất huyết/nhiễm khuẩn huyết: chú ý sốc, xuất huyết, tay chân lạnh, đau bụng, nôn ói, lừ đừ.'
          ],
          emergency: ['Sốc nhiễm khuẩn', 'Tay chân miệng độ 3-4', 'Sốt xuất huyết Dengue có sốc']
        },
        {
          dept: 'respiratory', type: 'info', title: 'Khoa Hô hấp',
          bullets: [
            'Thở nhanh, co kéo, rút lõm ngực, tím, SpO2 giảm, mệt cơ hô hấp hoặc ngực im lặng.',
            'Hen cấp nặng: không nói được câu dài, SpO2 < 90%, lơ mơ, PaCO2 tăng, đáp ứng kém với SABA.',
            'Viêm phổi nặng/suy hô hấp: cần oxy, HFNC/NIV hoặc đặt nội khí quản tùy mức độ.'
          ],
          emergency: ['Suy hô hấp cấp', 'Hen cấp nặng/nguy kịch', 'Ngưng thở']
        },
        {
          dept: 'neuro', type: 'warning', title: 'Khoa Thần kinh',
          bullets: [
            'Co giật kéo dài, co giật tái diễn, rối loạn tri giác, dấu thần kinh khu trú, cổ gượng, hôn mê.',
            'Trong TCM: giật mình chới với, run chi, thất điều, rung giật nhãn cầu, yếu/liệt chi, liệt dây sọ.',
            'Luôn kiểm tra đường huyết nhanh và bảo vệ đường thở khi tri giác xấu.'
          ],
          emergency: ['Trạng thái động kinh', 'Hôn mê', 'Tăng áp lực nội sọ']
        },
        {
          dept: 'cardio', type: 'danger', title: 'Khoa Tim mạch',
          bullets: [
            'Mạch nhanh không tương xứng sốt, mạch chậm bất thường, HA tăng hoặc tụt, CRT > 2 giây, chi lạnh, da nổi bông.',
            'TCM nặng có thể viêm cơ tim, phù phổi cấp, rối loạn thần kinh thực vật, sốc.',
            'Cần đo HA ở mọi trẻ có mạch nhanh/chậm và theo dõi sát SpO2, ran phổi, nước tiểu.'
          ],
          emergency: ['Sốc tim', 'Phù phổi cấp', 'Rối loạn nhịp ảnh hưởng huyết động']
        },
        {
          dept: 'icu', type: 'danger', title: 'Khoa Hồi sức',
          bullets: [
            'Bệnh nhân cần đặt nội khí quản, vận mạch, theo dõi HA xâm lấn, lọc máu, ECMO hoặc chăm sóc cấp cứu liên tục.',
            'TCM độ 3-4, sốc không đáp ứng, suy hô hấp nặng, phù phổi cấp, hôn mê/co giật là chỉ định hồi sức.',
            'Ưu tiên ổn định ABC trước, sau đó mới hoàn thiện chẩn đoán nguyên nhân.'
          ],
          emergency: ['Thở máy xâm nhập', 'Sốc cần vận mạch', 'Lọc máu liên tục/ECMO']
        }
      ];

      const protocolData = [
        {
          dept: 'emergency', type: 'danger', title: '🚨 Cấp cứu toàn viện - gom cấp cứu từ mọi khoa',
          content: (
            <div className="space-y-3 text-sm">
              <p className="font-bold text-red-700">Mục này luôn đứng đầu trong phần phác đồ và chứa tất cả tình trạng cấp cứu của các khoa.</p>
              <ul className="list-disc pl-5 space-y-1">
                <li><strong>Sốc phản vệ:</strong> ngừng dị nguyên, Adrenaline 1mg/ml tiêm bắp, nhắc lại mỗi 3-5 phút nếu chưa cải thiện.</li>
                <li><strong>Sốc nhiễm khuẩn:</strong> lactate, cấy máu, kháng sinh sớm, dịch tinh thể, vận mạch nếu không đáp ứng.</li>
                <li><strong>Suy hô hấp cấp:</strong> oxy, đánh giá SpO2/tri giác/công thở, chuẩn bị bóp bóng và đặt NKQ nếu thất bại.</li>
                <li><strong>Co giật kéo dài:</strong> ABC, oxy, đường truyền, kiểm tra đường huyết, Midazolam/Diazepam.</li>
                <li><strong>TCM độ 3-4:</strong> hồi sức tích cực, oxy tối đa 6 L/phút; đáp ứng kém sau 30-60 phút thì đặt NKQ sớm; độ 4 đặt NKQ thở máy.</li>
                <li><strong>Hen cấp nguy kịch:</strong> oxy, SABA + Ipratropium khí dung, corticoid sớm, MgSO4 nếu không đáp ứng, cân nhắc NKQ khi lơ mơ/mệt cơ hô hấp.</li>
              </ul>
            </div>
          )
        },
        {
          dept: 'infectious', type: 'warning', title: '🦠 Nhiễm - Tay chân miệng',
          content: (
            <div className="space-y-3 text-sm">
              <ProtocolSubHeader title="Cấp cứu của khoa Nhiễm" />
              <ul className="list-disc pl-5 space-y-1">
                <li>TCM độ 3: mạch &gt;170 lần/phút không sốt, HA tâm thu tăng theo tuổi, SpO2 &lt;94%, thở nhanh/khó thở, da nổi bông, vã mồ hôi, chi lạnh.</li>
                <li>TCM độ 4: ngưng thở, rối loạn nhịp thở, tím tái hoặc SpO2 &lt;92%, phù phổi cấp, sốc.</li>
              </ul>
              <ProtocolSubHeader title="Phác đồ điều trị" />
              <ol className="list-decimal pl-5 space-y-1">
                <li><strong>Độ 1:</strong> ngoại trú, hạ sốt giảm đau, dinh dưỡng, vệ sinh miệng/da, tái khám 1-2 ngày.</li>
                <li><strong>Độ 2a:</strong> nhập viện, điều trị như độ 1, Phenobarbital uống 5-7 mg/kg/ngày chia 2 lần, theo dõi sinh hiệu.</li>
                <li><strong>Độ 2b:</strong> phòng cấp cứu/hồi sức, đầu cao 30°, oxy mũi tối đa 6 L/phút, Phenobarbital 10-20 mg/kg IV 30 phút, cân nhắc IVIG nhóm 2 hoặc không đáp ứng sau 6 giờ.</li>
                <li><strong>Độ 3:</strong> hồi sức tích cực, oxy tối đa 6 L/phút; nếu đáp ứng kém sau 30-60 phút đặt NKQ sớm. IVIG 1 g/kg/ngày 6-12 giờ. Dobutamin nếu mạch &gt;170 không tăng HA. Milrinone khi tăng HA.</li>
                <li><strong>Độ 4:</strong> đặt NKQ thở máy, chống sốc, Dobutamin ± Adrenaline/Noradrenaline, IVIG sau hồi sức sốc khi HATB ≥50 mmHg, cân nhắc lọc máu/ECMO.</li>
              </ol>
            </div>
          )
        },
        {
          dept: 'infectious', type: 'warning', title: '🦠 Nhiễm - Sốc nhiễm khuẩn',
          content: (
            <div className="space-y-2 text-sm">
              <ProtocolSubHeader title="Cấp cứu của khoa Nhiễm" />
              <p className="font-bold">Gói xử trí 1 giờ đầu:</p>
              <ol className="list-decimal pl-5 space-y-1">
                <li>Đo lactate, làm lại nếu tăng.</li>
                <li>Cấy máu trước kháng sinh nếu không làm chậm điều trị.</li>
                <li>Kháng sinh phổ rộng đường tĩnh mạch càng sớm càng tốt.</li>
                <li>Dịch tinh thể 30 ml/kg khi tụt HA hoặc giảm tưới máu, theo dõi quá tải.</li>
                <li>Noradrenaline sớm nếu HA không đáp ứng dịch.</li>
              </ol>
            </div>
          )
        },
        {
          dept: 'respiratory', type: 'info', title: '🫁 Hô hấp - Hen cấp nặng',
          content: (
            <div className="space-y-2 text-sm">
              <ProtocolSubHeader title="Cấp cứu của khoa Hô hấp" />
              <p><strong>Dấu nặng:</strong> không nói được câu dài, SpO2 &lt;90%, lơ mơ, ngực im lặng, PaCO2 tăng, mệt cơ hô hấp.</p>
              <ul className="list-disc pl-5 space-y-1">
                <li>Oxy duy trì SpO2 93-95% ở người lớn, 94-98% ở trẻ em.</li>
                <li>Salbutamol khí dung liên tục 3 liều đầu, mỗi 20 phút; phối hợp Ipratropium.</li>
                <li>Corticoid toàn thân sớm: Hydrocortisone hoặc Methylprednisolone.</li>
                <li>MgSO4 2 g IV chậm trong 20 phút nếu không đáp ứng.</li>
                <li>Chuẩn bị đặt NKQ nếu lơ mơ, kiệt sức, ngưng thở, tăng CO2 hoặc SpO2 không cải thiện.</li>
              </ul>
            </div>
          )
        },
        {
          dept: 'neuro', type: 'warning', title: '🧠 Thần kinh - Cắt cơn co giật',
          content: (
            <div className="space-y-2 text-sm">
              <ProtocolSubHeader title="Cấp cứu của khoa Thần kinh" />
              <p className="font-bold text-orange-700">A-B-C, thở oxy, hút đàm, đặt đường truyền, kiểm tra đường huyết ngay.</p>
              <ul className="list-disc pl-5 space-y-1">
                <li><strong>Midazolam:</strong> 0,2 mg/kg IM hoặc 0,1 mg/kg IV chậm.</li>
                <li><strong>Diazepam:</strong> 0,1-0,2 mg/kg IV chậm, tốc độ tối đa 5 mg/phút.</li>
                <li>Đánh giá lại sau 5 phút; nếu còn co giật, xử trí theo trạng thái động kinh và chuẩn bị hồi sức hô hấp.</li>
              </ul>
            </div>
          )
        },
        {
          dept: 'cardio', type: 'danger', title: '❤️ Tim mạch - Sốc/phù phổi trong TCM nặng',
          content: (
            <div className="space-y-2 text-sm">
              <ProtocolSubHeader title="Cấp cứu của khoa Tim mạch" />
              <ul className="list-disc pl-5 space-y-1">
                <li>Nếu phù phổi: ngừng dịch, hỗ trợ hô hấp, đo CVP/HA xâm lấn nếu có, tăng Dobutamin.</li>
                <li>Nếu sốc không phù phổi: test LR/NS 5 ml/kg/15 phút, tối đa 3 lần giờ đầu, theo dõi quá tải.</li>
                <li>Dobutamin 5-20 µg/kg/phút; nếu còn sốc phối hợp Adrenaline hoặc Noradrenaline theo huyết động.</li>
                <li>Mục tiêu: HATT ≥100 mmHg, HATB ≥50-65 mmHg, ScvO2 ≥70%, lactate &lt;2 mmol/L.</li>
              </ul>
            </div>
          )
        },
        {
          dept: 'icu', type: 'danger', title: '⚙️ Hồi sức - Thở máy, lọc máu, ECMO trong TCM',
          content: (
            <div className="space-y-2 text-sm">
              <ProtocolSubHeader title="Cấp cứu của khoa Hồi sức" />
              <ul className="list-disc pl-5 space-y-1">
                <li><strong>Đặt NKQ:</strong> TCM độ 4 hoặc độ 3 kèm thở bất thường, thở nhanh &gt;70 lần/phút, SpO2 dao động, da xanh tái, mạch &gt;180, hôn mê/gồng chi.</li>
                <li><strong>Máy thở ban đầu:</strong> IP 12-20 cmH2O đạt Vt 6-8 ml/kg, PEEP 6-8, FiO2 60-100%, mục tiêu SpO2 94-98%.</li>
                <li><strong>Lọc máu liên tục:</strong> TCM độ 3-4 đang thở máy kèm sốc không đáp ứng 1-2 giờ, sốt cao thất bại 6-12 giờ, hoặc mạch &gt;180 kèm da nổi bông.</li>
                <li><strong>ECMO VA:</strong> cân nhắc khi độ 4 thất bại sau 6-12 giờ lọc máu, huyết động chưa ổn, VIS cao, EF &lt;30%, lactate &gt;5 mmol/L.</li>
              </ul>
            </div>
          )
        }
      ];

      const filteredRecognition = recognitionData.filter(item => selectedDept === 'all' || item.dept === selectedDept);
      const filteredProtocols = protocolData.filter(item => selectedDept === 'all' || item.dept === selectedDept || item.dept === 'emergency');

      return (
        <div className="space-y-4">
          <div className="bg-yellow-50 text-yellow-800 p-3 rounded-lg border border-yellow-200 flex gap-2 items-start text-sm">
            <IconAlertTriangle className="flex-shrink-0 mt-0.5" size={18} />
            <p>Phác đồ tóm tắt dùng để nhắc nhớ nhanh tại giường. Ưu tiên xử trí ABC và báo bác sĩ phụ trách khi có dấu hiệu cấp cứu.</p>
          </div>

          <div className="grid grid-cols-2 gap-2 bg-white p-2 rounded-xl border border-slate-200 shadow-sm">
            <button onClick={() => setMainMode('recognition')} className={`p-3 rounded-lg font-semibold text-sm ${mainMode === 'recognition' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'}`}>1. Nhận diện</button>
            <button onClick={() => setMainMode('protocols')} className={`p-3 rounded-lg font-semibold text-sm ${mainMode === 'protocols' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'}`}>2. Phác đồ</button>
          </div>

          <div className="flex gap-2 overflow-x-auto pb-1 scrollbar-hide">
            {departments.map(d => (
              <button key={d.id} onClick={() => setSelectedDept(d.id)} className={`flex-shrink-0 px-3 py-2 rounded-full text-sm border ${selectedDept === d.id ? 'bg-blue-700 text-white border-blue-700' : 'bg-white text-slate-700 border-slate-200'}`}>
                <span className="mr-1">{d.icon}</span>{d.label}
              </button>
            ))}
          </div>

          {mainMode === 'recognition' ? (
            <div className="space-y-3">
              {filteredRecognition.map(item => (
                <RecognitionCard key={item.title} item={item} />
              ))}
            </div>
          ) : (
            <div className="space-y-3">
              {filteredProtocols.map(p => (
                <AccordionItem key={p.title} title={p.title} type={p.type}>{p.content}</AccordionItem>
              ))}
            </div>
          )}
        </div>
      );
    }

    function ProtocolSubHeader({ title }) {
      return <div className="font-bold text-slate-800 bg-white border border-slate-200 rounded px-2 py-1">{title}</div>;
    }

    function RecognitionCard({ item }) {
      const typeStyles = {
        danger: 'border-red-200 bg-red-50 text-red-800',
        warning: 'border-orange-200 bg-orange-50 text-orange-800',
        info: 'border-blue-200 bg-blue-50 text-blue-800'
      };
      return (
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
          <div className={`p-3 font-bold border-b ${typeStyles[item.type]}`}>{item.title}</div>
          <div className="p-4 text-sm space-y-3">
            <div>
              <p className="font-semibold text-slate-700 mb-1">Dấu hiệu nhận diện</p>
              <ul className="list-disc pl-5 space-y-1 text-slate-700">
                {item.bullets.map((b, idx) => <li key={idx}>{b}</li>)}
              </ul>
            </div>
            <div className="bg-red-50 border border-red-100 rounded-lg p-2">
              <p className="font-semibold text-red-700 mb-1">Tình trạng cấp cứu thuộc khoa này</p>
              <div className="flex flex-wrap gap-1">
                {item.emergency.map((e, idx) => <span key={idx} className="text-xs bg-white border border-red-200 text-red-700 px-2 py-1 rounded-full">{e}</span>)}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function AccordionItem({ title, type, children }) {
      const [isOpen, setIsOpen] = useState(false);
      const typeStyles = { danger: 'bg-red-500 text-white', warning: 'bg-orange-500 text-white', info: 'bg-blue-500 text-white' };

      return (
        <div className="border border-slate-200 rounded-lg overflow-hidden bg-white shadow-sm">
          <button 
            onClick={() => setIsOpen(!isOpen)}
            className="w-full p-4 text-left flex justify-between items-center bg-white hover:bg-slate-50 transition-colors"
          >
            <div className="flex items-center gap-3">
              <span className={`w-3 h-3 rounded-full ${typeStyles[type]}`}></span>
              <span className="font-semibold text-slate-800">{title}</span>
            </div>
            {isOpen ? <IconChevronUp size={20} className="text-slate-400" /> : <IconChevronDown size={20} className="text-slate-400" />}
          </button>
          {isOpen && <div className="p-4 border-t border-slate-100 bg-slate-50">{children}</div>}
        </div>
      );
    }

    /* ==========================================
       MODULE 3: PIMPING & ANKI
       ========================================== */
    function PimpingModule() {
      const flashcards = [
        {
          question: "Trưởng khoa hỏi: Tại sao ca Suy hô hấp này em chọn thở NIV (BiPAP) thay vì đặt Nội khí quản?",
          answer: "NIV chỉ định tốt khi: (1) Bệnh nhân còn tỉnh táo, hợp tác; (2) Đường thở bảo vệ được, không có nhiều đàm nhớt; (3) Huyết động tương đối ổn định. Chống chỉ định: Ngưng thở, hôn mê, vật vã, nôn ói nhiều."
        },
        {
          question: "Trưởng khoa hỏi: Đánh giá bệnh nhân Sốc đã đủ dịch hay chưa bằng lâm sàng như thế nào?",
          answer: "Đánh giá qua 3 cửa sổ tưới máu mô: (1) Tri giác (Cải thiện lú lẫn); (2) Thận (Nước tiểu > 0.5ml/kg/h); (3) Da (Thời gian đổ đầy mao mạch CRT < 3s, da ấm hơn). Đo Huyết áp không phản ánh hoàn toàn tưới máu mô."
        },
        {
          question: "Trưởng khoa hỏi: Tại sao dùng Corticoid trong Cơn hen cấp?",
          answer: "Để giảm viêm đường thở cơ bản, ngăn ngừa tái phát (relapse) sớm và đẩy nhanh quá trình hồi phục. Lưu ý: Corticoid đường toàn thân cần 4-6 giờ mới bắt đầu có tác dụng lâm sàng rõ rệt."
        }
      ];

      return (
        <div className="space-y-4">
          <h2 className="font-bold text-slate-700 text-lg">Góc Hỏi Đáp Trưởng Khoa</h2>
          <p className="text-sm text-slate-500 mb-4">Các câu hỏi thường gặp khi đi buồng lâm sàng (Active Recall).</p>
          {flashcards.map((card, idx) => <Flashcard key={idx} question={card.question} answer={card.answer} />)}
        </div>
      );
    }

    function Flashcard({ question, answer }) {
      const [isFlipped, setIsFlipped] = useState(false);
      return (
        <div 
          onClick={() => setIsFlipped(!isFlipped)}
          className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm cursor-pointer transition-all duration-300 transform active:scale-95"
        >
          {!isFlipped ? (
            <div className="text-center min-h-[100px] flex flex-col justify-center">
              <span className="inline-block px-2 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded mb-3 w-max mx-auto">Quyết định lâm sàng</span>
              <h3 className="font-semibold text-slate-800 text-lg leading-snug">{question}</h3>
              <p className="text-xs text-slate-400 mt-4 animate-pulse">Chạm để xem câu trả lời</p>
            </div>
          ) : (
            <div className="min-h-[100px] flex flex-col justify-center bg-green-50 p-4 -m-5 rounded-xl border-2 border-green-200">
              <span className="inline-block px-2 py-1 bg-green-200 text-green-800 text-xs font-bold rounded mb-3 w-max">Câu trả lời mẫu</span>
              <p className="text-slate-700 text-sm">{answer}</p>
            </div>
          )}
        </div>
      );
    }

    // Mount App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ClinicalRoundsAssistant />);
  </script>
</body>
</html>
