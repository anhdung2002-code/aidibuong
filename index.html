        'Amikacin': 'VD trẻ 50 kg, liều 15 mg/kg/ngày → 750 mg. Nếu Vinphacine 500 mg/100 ml: lấy 150 ml, TTM 300 ml/giờ trong 30 phút hoặc chỉnh 30–60 phút theo khoa.',
        'Gentamicin/Gentamycin': 'VD trẻ 10 kg, liều 5 mg/kg/ngày → Gentamicin 0,05 g x 1 TB/TM. Nếu truyền TM, pha loãng và truyền theo quy trình khoa, theo dõi TDM khi cần.',
        'Meropenem': 'VD trẻ 25 ngày tuổi 4 kg NTSS → Meropenem 0,12 g x 3 TMC (30 mg/kg x 3). VD trẻ 20 kg → 800 mg pha NaCl 0,9% đủ 40 ml, TTM 15 ml/giờ trong 3 giờ.',
        'Imipenem-cilastatin': 'VD trẻ 10 kg → Imipenem 0,25 g. Nếu chai 0,5 g/100 ml NaCl 0,9%: lấy 50 ml, TTM 50 ml/giờ x 4 cữ.',
        'Vancomycin': 'VD trẻ 50 kg, liều 15 mg/kg x 4 → 0,75 g/cữ. Pha NaCl 0,9% để nồng độ khoảng 5 mg/ml: 750 mg đủ 150 ml, TTM 150 ml/giờ trong 1 giờ.',
        'Linezolid': 'VD trẻ 10 tuổi 40 kg → Linezolid 400 mg. Nếu chai 0,6 g/300 ml: lấy 200 ml, TTM 200 ml/giờ trong 1 giờ.',
        'Colistin/Colistimethate sodium': 'VD trẻ 10 kg → Colistin TZF 300.000 UI pha NaCl 0,9% đủ 30 ml, TTM 30 ml/giờ x 3 cữ (30.000 UI/kg/cữ). Bắt buộc kiểm tra đơn vị IU/CMS/CBA của chế phẩm.',
        'Clindamycin': 'VD trẻ 20 kg → Clindamycin 200 mg pha NaCl 0,9% đủ 20 ml, TTM 20 ml/giờ x 3 cữ; giữ nồng độ ≤18 mg/ml, truyền khoảng 60 phút.',
        'Acyclovir/Aciclovir': 'VD trẻ 6 tuổi 20 kg → Acyclovir 300 mg pha NaCl 0,9% đủ 60 ml (5 mg/ml), TTM 40 ml/giờ x 3 cữ; truyền ≥1 giờ, bù dịch và chỉnh liều theo thận.'
      };

      const groups = ['Tất cả', ...Array.from(new Set(drugs.map(d => d.group)))];
      const diseaseTree = {
        'Tay chân miệng': [
          'Tất cả phân độ/biến chứng', 'Độ 1', 'Độ 2a', 'Độ 2b', 'Độ 3', 'Độ 4',
          'Biến chứng thần kinh/co giật', 'Rối loạn thần kinh thực vật - tăng HA',
          'Suy hô hấp - tuần hoàn', 'Phù phổi/sốc', 'Sốt cao khó kiểm soát'
        ],
        'Sởi': [
          'Tất cả phân độ/biến chứng', 'Không biến chứng', 'Viêm phổi/suy hô hấp',
          'Viêm não', 'Viêm tai giữa', 'Loét giác mạc/loét miệng', 'Tiêu chảy',
          'Sởi nặng/tăng đáp ứng viêm'
        ],
        'Viêm màng não': [
          'Tất cả phân độ/biến chứng', 'Nghi viêm màng não vi khuẩn', 'Nguy cơ phế cầu kháng thuốc',
          'Nguy cơ Listeria', 'Co giật cấp', 'Tăng áp lực nội sọ'
        ],
        'Viêm não': [
          'Tất cả phân độ/biến chứng', 'Nghi HSV/VZV', 'Co giật', 'Tăng áp lực nội sọ',
          'Viêm não tự miễn/ADEM', 'Cần an thần/thở máy'
        ],
        'Nhiễm khuẩn nặng/sốc': [
          'Tất cả phân độ/biến chứng', 'Sốc', 'Sốc tim', 'Sốc giãn mạch', 'Nhiễm khuẩn nặng'
        ],
        'Rắn cắn': [
          'Tất cả phân độ/biến chứng', 'Nhiễm độc rắn lục/rắn độc', 'Nguy cơ phản vệ khi truyền huyết thanh'
        ],
        'Tiêu hóa': [
          'Tất cả phân độ/biến chứng', 'Tiêu chảy', 'Táo bón', 'Loét miệng/đau miệng', 'Ngộ độc paracetamol'
        ],
        'Tim mạch': [
          'Tất cả phân độ/biến chứng', 'Tim bẩm sinh phụ thuộc ống động mạch', 'SVT/loạn nhịp'
        ]
      };
      const procedures = [
        'Tất cả thủ thuật', 'Đặt nội khí quản', 'Thở máy/an thần giảm đau', 'Chống co giật cấp',
        'Vận mạch/sốc', 'Tăng áp lực nội sọ', 'Kháng sinh kinh nghiệm viêm màng não', 'Kháng sinh nhiễm khuẩn nặng/Gram âm', 'Truyền IVIG', 'Truyền PGE1', 'Truyền huyết thanh kháng nọc rắn', 'Bơm hậu môn/thụt tháo', 'Điều trị ngộ độc paracetamol'
      ];

      const diseaseAliases = {
        'Tay chân miệng': ['TCM', 'Tay chân miệng'],
        'Sởi': ['Sởi'],
        'Viêm màng não': ['Viêm màng não'],
        'Viêm não': ['Viêm não', 'HSV-1 encephalitis'],
        'Nhiễm khuẩn nặng/sốc': ['Sốc', 'Nhiễm khuẩn nặng', 'Sốc tim'],
        'Rắn cắn': ['Rắn cắn', 'Huyết thanh kháng nọc độc rắn'],
        'Tiêu hóa': ['Tiêu chảy', 'Táo bón', 'Loét miệng', 'Ngộ độc paracetamol', 'Zentomyces', 'L-Bio', 'Varogel', 'Rectiofar', 'N-Acetylcysteine'],
        'Tim mạch': ['Tim bẩm sinh phụ thuộc ống động mạch', 'SVT', 'Loạn nhịp', 'PGE1', 'Adenosine', 'Amiodarone']
      };

      const nodeDrugMap = {
        'Độ 1': ['Paracetamol', 'Ibuprofen', 'Varogel'],
        'Độ 2a': ['Phenobarbital', 'Paracetamol', 'Ibuprofen', 'Varogel'],
        'Độ 2b': ['Phenobarbital', 'IVIG/Gammaglobulin', 'Mannitol', 'Natri clorid 3%', 'Paracetamol'],
        'Độ 3': ['Phenobarbital', 'IVIG/Gammaglobulin', 'Dobutamin', 'Milrinone', 'Paracetamol', 'Ibuprofen', 'Methylprednisolone', 'Midazolam', 'Diazepam'],
        'Độ 4': ['Dobutamin', 'Adrenaline', 'Noradrenaline', 'IVIG/Gammaglobulin', 'Midazolam', 'Diazepam', 'Fentanyl', 'Rocuronium', 'Mannitol', 'Natri clorid 3%', 'Furosemide', 'Ceftriaxone', 'Cefotaxime'],
        'Biến chứng thần kinh/co giật': ['Phenobarbital', 'Midazolam', 'Diazepam', 'Mannitol', 'Natri clorid 3%', 'IVIG/Gammaglobulin'],
        'Rối loạn thần kinh thực vật - tăng HA': ['Milrinone', 'Dobutamin'],
        'Suy hô hấp - tuần hoàn': ['Adrenaline', 'Noradrenaline', 'Dobutamin', 'Milrinone', 'Rocuronium', 'Midazolam', 'Fentanyl', 'Morphin'],
        'Phù phổi/sốc': ['Dobutamin', 'Adrenaline', 'Noradrenaline', 'Furosemide'],
        'Sốt cao khó kiểm soát': ['Paracetamol', 'Ibuprofen', 'Methylprednisolone'],
        'Không biến chứng': ['Vitamin A'],
        'Viêm phổi/suy hô hấp': ['Ceftriaxone', 'Cefotaxime', 'Amoxicillin-clavulanic', 'Azithromycin', 'IVIG/Gammaglobulin'],
        'Viêm não': ['Acyclovir/Aciclovir', 'Diazepam', 'Midazolam', 'Phenobarbital', 'Mannitol', 'IVIG/Gammaglobulin', 'Methylprednisolone'],
        'Viêm tai giữa': ['Amoxicillin-clavulanic', 'Ampicillin/Amoxicillin'],
        'Loét giác mạc/loét miệng': ['Amoxicillin-clavulanic', 'Metronidazole', 'Cefotaxime', 'Varogel'],
        'Tiêu chảy': ['Zinc', 'Zentomyces', 'L-Bio'],
        'Sởi nặng/tăng đáp ứng viêm': ['IVIG/Gammaglobulin', 'Vitamin A', 'Ceftriaxone', 'Cefotaxime'],
        'Nghi viêm màng não vi khuẩn': ['Ceftriaxone', 'Cefotaxime', 'Dexamethasone'],
        'Nguy cơ phế cầu kháng thuốc': ['Vancomycin', 'Ceftriaxone', 'Cefotaxime'],
        'Nguy cơ Listeria': ['Ampicillin/Amoxicillin'],
        'Co giật cấp': ['Diazepam', 'Midazolam', 'Phenobarbital'],
        'Tăng áp lực nội sọ': ['Mannitol', 'Natri clorid 3%', 'Furosemide'],
        'Nghi HSV/VZV': ['Acyclovir/Aciclovir'],
        'Co giật': ['Diazepam', 'Midazolam', 'Phenobarbital'],
        'Viêm não tự miễn/ADEM': ['Methylprednisolone', 'IVIG/Gammaglobulin'],
        'Cần an thần/thở máy': ['Midazolam', 'Fentanyl', 'Morphin', 'Rocuronium'],
        'Sốc': ['Adrenaline', 'Noradrenaline', 'Dopamin', 'Dobutamin', 'Hydrocortisone'],
        'Sốc tim': ['Dobutamin', 'Milrinone', 'Adrenaline'],
        'Sốc giãn mạch': ['Noradrenaline', 'Adrenaline', 'Hydrocortisone'],
        'Nhiễm khuẩn nặng': ['Ceftriaxone', 'Cefotaxime', 'Vancomycin', 'Meropenem', 'Imipenem-cilastatin', 'Amikacin', 'Gentamicin/Gentamycin', 'Ceftazidime', 'Cefepime', 'Ciprofloxacin', 'Levofloxacin', 'Linezolid', 'Clindamycin', 'Colistin/Colistimethate sodium'],
        'Nhiễm độc rắn lục/rắn độc': ['Huyết thanh kháng nọc độc rắn'],
        'Nguy cơ phản vệ khi truyền huyết thanh': ['Adrenaline', 'Huyết thanh kháng nọc độc rắn', 'Hydrocortisone'],
        'Táo bón': ['Rectiofar'],
        'Loét miệng/đau miệng': ['Varogel', 'Metronidazole', 'Amoxicillin-clavulanic'],
        'Ngộ độc paracetamol': ['N-Acetylcysteine'],
        'Tim bẩm sinh phụ thuộc ống động mạch': ['Prostaglandin E1 (Alprostadil/PGE1)'],
        'SVT/loạn nhịp': ['Adenosine', 'Amiodarone']
      };

      const procedureDrugMap = {
        'Đặt nội khí quản': ['Rocuronium', 'Midazolam', 'Fentanyl', 'Morphin'],
        'Thở máy/an thần giảm đau': ['Midazolam', 'Fentanyl', 'Morphin', 'Rocuronium'],
        'Chống co giật cấp': ['Diazepam', 'Midazolam', 'Phenobarbital'],
        'Vận mạch/sốc': ['Adrenaline', 'Noradrenaline', 'Dopamin', 'Dobutamin', 'Milrinone', 'Hydrocortisone'],
        'Tăng áp lực nội sọ': ['Mannitol', 'Natri clorid 3%', 'Furosemide'],
        'Kháng sinh kinh nghiệm viêm màng não': ['Ceftriaxone', 'Cefotaxime', 'Ampicillin/Amoxicillin', 'Vancomycin', 'Meropenem', 'Dexamethasone'],
        'Kháng sinh nhiễm khuẩn nặng/Gram âm': ['Ceftriaxone', 'Cefotaxime', 'Ceftazidime', 'Cefepime', 'Meropenem', 'Imipenem-cilastatin', 'Amikacin', 'Gentamicin/Gentamycin', 'Ciprofloxacin', 'Levofloxacin', 'Colistin/Colistimethate sodium', 'Linezolid', 'Clindamycin'],
        'Truyền IVIG': ['IVIG/Gammaglobulin'],
        'Truyền PGE1': ['Prostaglandin E1 (Alprostadil/PGE1)'],
        'Truyền huyết thanh kháng nọc rắn': ['Huyết thanh kháng nọc độc rắn', 'Adrenaline', 'Hydrocortisone'],
        'Bơm hậu môn/thụt tháo': ['Rectiofar'],
        'Điều trị ngộ độc paracetamol': ['N-Acetylcysteine']
      };

      const normalized = (value) => value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      const q = normalized(query.trim());
      const textOf = (d) => [d.name, d.group, d.diseases.join(' '), d.dose, d.route, d.solvent, d.note, mixingExamples[d.name] || ''].join(' ');
      const nameInList = (drug, list) => (list || []).some(name => drug.name === name || drug.name.includes(name) || name.includes(drug.name));
      const matchesDiseaseTree = (drug) => {
        if (drugTab !== 'disease') return true;
        if (selectedDisease === 'Tất cả bệnh') return true;
        const aliases = diseaseAliases[selectedDisease] || [selectedDisease];
        const diseaseMatch = aliases.some(alias => normalized(textOf(drug)).includes(normalized(alias)));
        if (!diseaseMatch) return false;
        if (selectedNode === 'Tất cả phân độ/biến chứng') return true;
        return nameInList(drug, nodeDrugMap[selectedNode]);
      };
      const matchesProcedure = (drug) => {
        if (drugTab !== 'procedure') return true;
        if (selectedProcedure === 'Tất cả thủ thuật') return true;
        return nameInList(drug, procedureDrugMap[selectedProcedure]);
      };

      const filtered = drugs.filter(d => {
        const matchesCategory = category === 'Tất cả' || d.group === category;
        const haystack = normalized(textOf(d));
        return matchesCategory && matchesDiseaseTree(d) && matchesProcedure(d) && (!q || haystack.includes(q));
      });

      const currentNodeOptions = selectedDisease === 'Tất cả bệnh' ? ['Tất cả phân độ/biến chứng'] : diseaseTree[selectedDisease];
      const diseaseOptions = ['Tất cả bệnh', ...Object.keys(diseaseTree)];

      return (
        <div className="space-y-4 pb-6">
          <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-3 space-y-3 sticky top-0 z-10">
            <div className="flex items-center gap-2 border border-slate-200 rounded-lg px-3 py-2 bg-slate-50">
              <IconSearch size={18} className="text-slate-400" />
              <input value={query} onChange={e => setQuery(e.target.value)} placeholder="Search thuốc, bệnh, liều, đường dùng..." className="bg-transparent outline-none text-sm flex-1" />
            </div>

            <div className="grid grid-cols-2 gap-2">
              <select value={category} onChange={e => setCategory(e.target.value)} className="p-2 rounded-lg border border-slate-200 text-sm bg-white">
                {groups.map(g => <option key={g}>{g}</option>)}
              </select>
              <div className="grid grid-cols-2 rounded-lg border border-slate-200 overflow-hidden bg-slate-50 text-xs font-semibold">
                <button onClick={() => setDrugTab('disease')} className={`py-2 ${drugTab === 'disease' ? 'bg-blue-700 text-white' : 'text-slate-600'}`}>Bệnh</button>
                <button onClick={() => setDrugTab('procedure')} className={`py-2 border-l border-slate-200 ${drugTab === 'procedure' ? 'bg-blue-700 text-white' : 'text-slate-600'}`}>Thủ thuật</button>
              </div>
            </div>

            {drugTab === 'disease' ? (
              <div className="grid grid-cols-2 gap-2">
                <select value={selectedDisease} onChange={e => { setSelectedDisease(e.target.value); setSelectedNode('Tất cả phân độ/biến chứng'); }} className="p-2 rounded-lg border border-slate-200 text-sm bg-white">
                  {diseaseOptions.map(d => <option key={d}>{d}</option>)}
                </select>
                <select value={selectedNode} onChange={e => setSelectedNode(e.target.value)} className="p-2 rounded-lg border border-slate-200 text-sm bg-white">
                  {currentNodeOptions.map(n => <option key={n}>{n}</option>)}
                </select>
              </div>
            ) : (
              <select value={selectedProcedure} onChange={e => setSelectedProcedure(e.target.value)} className="w-full p-2 rounded-lg border border-slate-200 text-sm bg-white">
                {procedures.map(p => <option key={p}>{p}</option>)}
              </select>
            )}

            <div className="flex gap-2 overflow-x-auto scrollbar-hide">
              {drugTab === 'disease'
                ? ['Tay chân miệng', 'Độ 3', 'Độ 4', 'Sởi', 'Viêm não', 'Viêm màng não'].map(tag => (
                    <button key={tag} onClick={() => { diseaseTree[tag] ? (setSelectedDisease(tag), setSelectedNode('Tất cả phân độ/biến chứng')) : setSelectedNode(tag); }} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs border bg-white text-slate-600 border-slate-200">{tag}</button>
                  ))
                : procedures.filter(p => p !== 'Tất cả thủ thuật').map(tag => (
                    <button key={tag} onClick={() => setSelectedProcedure(tag)} className={`flex-shrink-0 px-3 py-1.5 rounded-full text-xs border ${selectedProcedure === tag ? 'bg-blue-700 text-white border-blue-700' : 'bg-white text-slate-600 border-slate-200'}`}>{tag}</button>
                  ))}
            </div>
          </div>

          <div className="text-xs text-slate-500 space-y-1">
            <p>Tìm thấy {filtered.length} thuốc. Kiểm tra lại phác đồ bệnh viện trước khi kê/truyền.</p>
            <p className="font-medium text-slate-600">
              Cột 2 đang lọc theo: {drugTab === 'disease' ? `${selectedDisease} → ${selectedNode}` : `Thủ thuật → ${selectedProcedure}`}
            </p>
          </div>

          <div className="space-y-3">
            {filtered.map((drug, idx) => (
              <div key={idx} className="bg-white rounded-xl border border-slate-200 shadow-sm p-4">
                <div className="flex justify-between gap-2">
                  <div>
                    <h3 className="font-bold text-slate-800">{drug.name}</h3>
                    <p className="text-xs text-blue-700 font-semibold mt-0.5">{drug.group}</p>
                  </div>
                  <span className="text-xs bg-slate-100 text-slate-600 rounded-full px-2 py-1 h-max">{drug.route}</span>
                </div>
                <div className="mt-3 space-y-1 text-sm text-slate-700">
                  <p><strong>Liều:</strong> {drug.dose}</p>
                  <p><strong>Dung môi:</strong> {drug.solvent}</p>
                  {mixingExamples[drug.name] && (
                    <div className="mt-2 rounded-lg bg-amber-50 border border-amber-100 p-2 text-amber-900">
                      <p className="font-semibold">Ví dụ cách pha / truyền:</p>
                      <p>{mixingExamples[drug.name]}</p>
                    </div>
                  )}
                  <p><strong>Ghi chú:</strong> {drug.note}</p>
                </div>
                <div className="flex flex-wrap gap-1 mt-3">
                  {drug.diseases.map(tag => <span key={tag} className="text-xs bg-blue-50 text-blue-700 border border-blue-100 rounded-full px-2 py-1">{tag}</span>)}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ==========================================
       MODULE 4: PIMPING & ANKI
       ========================================== */
    function PimpingModule() {
      const flashcards = [
        {
          question: "Trưởng khoa hỏi: Tại sao ca Suy hô hấp này em chọn thở NIV (BiPAP) thay vì đặt Nội khí quản?",
          answer: "NIV chỉ định tốt khi: (1) Bệnh nhân còn tỉnh táo, hợp tác; (2) Đường thở bảo vệ được, không có nhiều đàm nhớt; (3) Huyết động tương đối ổn định. Chống chỉ định: Ngưng thở, hôn mê, vật vã, nôn ói nhiều."
        },
        {
          question: "Trưởng khoa hỏi: Đánh giá bệnh nhân Sốc đã đủ dịch hay chưa bằng lâm sàng như thế nào?",
          answer: "Đánh giá qua 3 cửa sổ tưới máu mô: (1) Tri giác (Cải thiện lú lẫn); (2) Thận (Nước tiểu > 0.5ml/kg/h); (3) Da (Thời gian đổ đầy mao mạch CRT < 3s, da ấm hơn). Đo Huyết áp không phản ánh hoàn toàn tưới máu mô."
        },
        {
          question: "Trưởng khoa hỏi: Tại sao dùng Corticoid trong Cơn hen cấp?",
          answer: "Để giảm viêm đường thở cơ bản, ngăn ngừa tái phát (relapse) sớm và đẩy nhanh quá trình hồi phục. Lưu ý: Corticoid đường toàn thân cần 4-6 giờ mới bắt đầu có tác dụng lâm sàng rõ rệt."
        }
      ];

      return (
        <div className="space-y-4">
          <h2 className="font-bold text-slate-700 text-lg">Góc Hỏi Đáp Trưởng Khoa</h2>
          <p className="text-sm text-slate-500 mb-4">Các câu hỏi thường gặp khi đi buồng lâm sàng (Active Recall).</p>
          {flashcards.map((card, idx) => <Flashcard key={idx} question={card.question} answer={card.answer} />)}
        </div>
      );
    }

    function Flashcard({ question, answer }) {
      const [isFlipped, setIsFlipped] = useState(false);
      return (
        <div 
          onClick={() => setIsFlipped(!isFlipped)}
          className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm cursor-pointer transition-all duration-300 transform active:scale-95"
        >
          {!isFlipped ? (
            <div className="text-center min-h-[100px] flex flex-col justify-center">
              <span className="inline-block px-2 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded mb-3 w-max mx-auto">Quyết định lâm sàng</span>
              <h3 className="font-semibold text-slate-800 text-lg leading-snug">{question}</h3>
              <p className="text-xs text-slate-400 mt-4 animate-pulse">Chạm để xem câu trả lời</p>
            </div>
          ) : (
            <div className="min-h-[100px] flex flex-col justify-center bg-green-50 p-4 -m-5 rounded-xl border-2 border-green-200">
              <span className="inline-block px-2 py-1 bg-green-200 text-green-800 text-xs font-bold rounded mb-3 w-max">Câu trả lời mẫu</span>
              <p className="text-slate-700 text-sm">{answer}</p>
            </div>
          )}
        </div>
      );
    }

    // Mount App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ClinicalRoundsAssistant />);
  </script>
</body>
</html>
