        "Tiêu hóa": [
                "Tất cả phân độ/biến chứng",
                "Táo bón",
                "Tiêu chảy",
                "Loét miệng/đau miệng",
                "Ngộ độc paracetamol"
        ],
        "Tim mạch": [
                "Tất cả phân độ/biến chứng",
                "Tim bẩm sinh phụ thuộc ống động mạch",
                "SVT/loạn nhịp",
                "Tăng huyết áp/suy tim"
        ]
};
      const nodeDrugMap = {
        "Độ 1": [
                "Paracetamol",
                "Varogel"
        ],
        "Độ 2a": [
                "Paracetamol",
                "Phenobarbital uống",
                "Varogel"
        ],
        "Độ 2b nhóm 1": [
                "Phenobarbital truyền",
                "Midazolam",
                "IVIG/Gammaglobulin"
        ],
        "Độ 2b nhóm 2": [
                "Phenobarbital truyền",
                "Midazolam",
                "IVIG/Gammaglobulin"
        ],
        "Độ 3": [
                "Milrinone",
                "Dobutamin",
                "Phenobarbital truyền",
                "Midazolam",
                "IVIG/Gammaglobulin"
        ],
        "Độ 4": [
                "Adrenaline",
                "Noradrenaline",
                "Dobutamin",
                "Milrinone",
                "Midazolam",
                "Fentanyl",
                "Morphin",
                "Rocuronium",
                "IVIG/Gammaglobulin"
        ],
        "Co giật": [
                "Diazepam",
                "Midazolam",
                "Phenobarbital truyền"
        ],
        "Sốc/phù phổi": [
                "Adrenaline",
                "Noradrenaline",
                "Dobutamin",
                "Milrinone",
                "Mannitol",
                "Furosemide"
        ],
        "Không biến chứng": [
                "Paracetamol",
                "Vitamin A"
        ],
        "Viêm phổi/viêm thanh quản": [
                "Amoxicillin",
                "Amoxicillin-clavulanic",
                "Cefotaxime",
                "Ceftriaxone",
                "Azithromycin",
                "Dexamethasone"
        ],
        "Viêm tai giữa": [
                "Amoxicillin",
                "Amoxicillin-clavulanic",
                "Ceftriaxone"
        ],
        "Loét miệng/loét giác mạc": [
                "Varogel",
                "Amoxicillin-clavulanic",
                "Metronidazole",
                "Vitamin A"
        ],
        "Viêm não": [
                "Acyclovir",
                "Ceftriaxone",
                "Cefotaxime",
                "Diazepam",
                "Midazolam",
                "Phenobarbital truyền",
                "Mannitol",
                "Furosemide"
        ],
        "Suy hô hấp/sốc": [
                "Adrenaline",
                "Noradrenaline",
                "Dobutamin",
                "Midazolam",
                "Fentanyl",
                "Morphin",
                "Rocuronium",
                "Hydrocortisone"
        ],
        "Nghi HSV/VZV": [
                "Acyclovir"
        ],
        "Tăng áp lực nội sọ": [
                "Mannitol",
                "Furosemide"
        ],
        "Viêm não tự miễn/ADEM": [
                "Methylprednisolone",
                "IVIG/Gammaglobulin"
        ],
        "Cần an thần/thở máy": [
                "Midazolam",
                "Fentanyl",
                "Morphin",
                "Rocuronium"
        ],
        "Kháng sinh kinh nghiệm": [
                "Ceftriaxone",
                "Cefotaxime",
                "Ampicillin",
                "Vancomycin",
                "Meropenem",
                "Dexamethasone"
        ],
        "Nguy cơ Listeria": [
                "Ampicillin"
        ],
        "Co giật cấp": [
                "Diazepam",
                "Midazolam",
                "Phenobarbital truyền"
        ],
        "Sốc tim": [
                "Dobutamin",
                "Milrinone",
                "Adrenaline"
        ],
        "Sốc giãn mạch": [
                "Noradrenaline",
                "Adrenaline",
                "Hydrocortisone"
        ],
        "Nhiễm khuẩn nặng": [
                "Ceftriaxone",
                "Cefotaxime",
                "Ceftazidime",
                "Cefepime",
                "Meropenem",
                "Imipenem-cilastatin",
                "Vancomycin",
                "Amikacin",
                "Gentamicin/Gentamycin",
                "Linezolid",
                "Colistin",
                "Clindamycin",
                "Ampicillin-sulbactam"
        ],
        "Gram âm/Pseudomonas": [
                "Ceftazidime",
                "Cefepime",
                "Ciprofloxacin",
                "Levofloxacin",
                "Meropenem",
                "Imipenem-cilastatin",
                "Amikacin",
                "Gentamicin/Gentamycin",
                "Colistin"
        ],
        "MRSA/MSSA": [
                "Vancomycin",
                "Linezolid",
                "Clindamycin",
                "Oxacillin"
        ],
        "Kỵ khí": [
                "Metronidazole",
                "Clindamycin",
                "Ampicillin-sulbactam"
        ],
        "Chuyển uống": [
                "Amoxicillin",
                "Amoxicillin-clavulanic",
                "Cefixime",
                "Cefuroxime",
                "Azithromycin",
                "Linezolid"
        ],
        "Nhiễm độc rắn lục/rắn độc": [
                "Huyết thanh kháng nọc độc rắn"
        ],
        "Nguy cơ phản vệ khi truyền huyết thanh": [
                "Adrenaline",
                "Hydrocortisone",
                "Huyết thanh kháng nọc độc rắn"
        ],
        "Táo bón": [
                "Rectiofar"
        ],
        "Tiêu chảy": [
                "Zinc",
                "L-Bio",
                "Zentomyces"
        ],
        "Loét miệng/đau miệng": [
                "Varogel",
                "Metronidazole",
                "Amoxicillin-clavulanic"
        ],
        "Ngộ độc paracetamol": [
                "N-Acetylcysteine"
        ],
        "Tim bẩm sinh phụ thuộc ống động mạch": [
                "Prostaglandin E1 (Alprostadil/PGE1)"
        ],
        "SVT/loạn nhịp": [
                "Adenosine",
                "Amiodarone"
        ],
        "Tăng huyết áp/suy tim": [
                "Enalapril",
                "Furosemide"
        ]
};
      const procedureDrugMap = {
        "Tất cả thủ thuật": [],
        "Đặt nội khí quản": [
                "Rocuronium",
                "Midazolam",
                "Fentanyl",
                "Morphin"
        ],
        "Thở máy/an thần giảm đau": [
                "Midazolam",
                "Fentanyl",
                "Morphin",
                "Rocuronium"
        ],
        "Chống co giật cấp": [
                "Diazepam",
                "Midazolam",
                "Phenobarbital truyền"
        ],
        "Vận mạch/sốc": [
                "Adrenaline",
                "Noradrenaline",
                "Dopamin",
                "Dobutamin",
                "Milrinone",
                "Hydrocortisone"
        ],
        "Tăng áp lực nội sọ": [
                "Mannitol",
                "Furosemide"
        ],
        "Kháng sinh kinh nghiệm viêm màng não": [
                "Ceftriaxone",
                "Cefotaxime",
                "Ampicillin",
                "Vancomycin",
                "Meropenem",
                "Dexamethasone"
        ],
        "Kháng sinh nhiễm khuẩn nặng/Gram âm": [
                "Ceftriaxone",
                "Cefotaxime",
                "Ceftazidime",
                "Cefepime",
                "Meropenem",
                "Imipenem-cilastatin",
                "Amikacin",
                "Gentamicin/Gentamycin",
                "Ciprofloxacin",
                "Levofloxacin",
                "Colistin",
                "Linezolid",
                "Clindamycin"
        ],
        "Truyền IVIG": [
                "IVIG/Gammaglobulin"
        ],
        "Truyền PGE1": [
                "Prostaglandin E1 (Alprostadil/PGE1)"
        ],
        "Truyền huyết thanh kháng nọc rắn": [
                "Huyết thanh kháng nọc độc rắn",
                "Adrenaline",
                "Hydrocortisone"
        ],
        "Bơm hậu môn/thụt tháo": [
                "Rectiofar"
        ],
        "Điều trị ngộ độc paracetamol": [
                "N-Acetylcysteine"
        ]
};
      const diseaseAliases = {
        'Tay chân miệng': ['TCM', 'Tay chân miệng'],
        'Sởi': ['Sởi'],
        'Viêm não': ['Viêm não', 'HSV', 'Viêm não tự miễn'],
        'Viêm màng não': ['Viêm màng não', 'VMN'],
        'Sốc': ['Sốc'],
        'Nhiễm khuẩn': ['Nhiễm khuẩn', 'Kháng sinh', 'Gram âm', 'MRSA', 'MSSA'],
        'Rắn cắn': ['Rắn cắn', 'nọc rắn'],
        'Tiêu hóa': ['Tiêu hóa', 'Táo bón', 'Tiêu chảy', 'Loét miệng'],
        'Tim mạch': ['Tim mạch', 'SVT', 'Loạn nhịp', 'ống động mạch']
      };

      const groups = ['Tất cả', ...Array.from(new Set(drugs.map(d => d.group)))];
      const procedures = Object.keys(procedureDrugMap);
      const diseaseOptions = ['Tất cả bệnh', ...Object.keys(diseaseTree)];
      const normalized = (value) => String(value || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      const textOf = (d) => [d.name, d.group, (d.diseases || []).join(' '), d.dose, d.route, d.solvent, d.note, d.example].join(' ');
      const nameInList = (drug, list) => (list || []).some(name => drug.name === name || drug.name.includes(name) || name.includes(drug.name));

      const splitDoseText = (doseText = '') => {
        const raw = String(doseText || '').trim();
        if (!raw) return [];

        // Tách theo câu, nhưng giữ các cụm có dấu ; để mỗi liều/nhóm tuổi nằm riêng một dòng.
        const roughParts = raw
          .replace(/\.\s+(?=(Sơ sinh|Trẻ em|Trẻ nhỏ|Trẻ lớn|Người lớn|<|≤|>|≥|\d|Uống|TM|TMC|TTM|TB|Hậu môn|VMN|MRSA|MSSA|Nhiễm|Viêm|Liều|Duy trì|Tấn công|Phản vệ))/g, '|')
          .replace(/;\s+(?=(Sơ sinh|Trẻ em|Trẻ nhỏ|Trẻ lớn|Người lớn|<|≤|>|≥|\d|Uống|TM|TMC|TTM|TB|VMN|MRSA|MSSA|Nhiễm|Viêm|Liều|Duy trì|Tấn công|Phản vệ))/g, '|')
          .split('|')
          .map(x => x.trim().replace(/\.$/, ''))
          .filter(Boolean);

        const rows = [];
        roughParts.forEach(part => {
          // Nếu trong cùng một câu có cả sơ sinh và trẻ em, tách mạnh để dễ nhìn.
          const subParts = part
            .replace(/\s+(?=Sơ sinh)/g, '|Sơ sinh ')
            .replace(/\s+(?=Trẻ em)/g, '|Trẻ em ')
            .replace(/\s+(?=Trẻ nhỏ)/g, '|Trẻ nhỏ ')
            .replace(/\s+(?=Trẻ lớn)/g, '|Trẻ lớn ')
            .split('|')
            .map(x => x.trim())
            .filter(Boolean);
          subParts.forEach(item => rows.push(item));
        });

        return rows.map(item => {
          let label = 'Chung';
          let content = item;
          const patterns = [
            [/^Sơ sinh\s*:?\s*/i, 'Trẻ sơ sinh'],
            [/^Trẻ em\s*:?\s*/i, 'Trẻ nhỏ/trẻ em'],
            [/^Trẻ nhỏ\s*:?\s*/i, 'Trẻ nhỏ'],
            [/^Trẻ lớn\s*:?\s*/i, 'Trẻ lớn'],
            [/^Người lớn\s*:?\s*/i, 'Người lớn'],
            [/^Liều tấn công\s*:?\s*/i, 'Liều tấn công'],
            [/^Duy trì\s*:?\s*/i, 'Liều duy trì'],
            [/^VMN\s*:?\s*/i, 'Viêm màng não'],
            [/^MRSA\s*:?\s*/i, 'MRSA'],
            [/^MSSA\s*:?\s*/i, 'MSSA'],
            [/^Phản vệ\s*:?\s*/i, 'Phản vệ'],
          ];
          for (const [regex, rowLabel] of patterns) {
            if (regex.test(content)) {
              label = rowLabel;
              content = content.replace(regex, '').trim();
              break;
            }
          }
          return { label, content };
        }).filter(row => row.content);
      };

      function DoseDisplay({ dose }) {
        const rows = splitDoseText(dose);
        if (rows.length <= 1) {
          return <p><strong>Liều:</strong> {dose}</p>;
        }
        return (
          <div>
            <p className="font-bold mb-1">Liều:</p>
            <div className="overflow-x-auto rounded-lg border border-slate-200 bg-white">
              <table className="w-full text-xs border-collapse">
                <thead className="bg-slate-100 text-slate-700">
                  <tr>
                    <th className="text-left p-2 border-b border-slate-200 w-28">Nhóm</th>
                    <th className="text-left p-2 border-b border-slate-200">Liều / cách dùng</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map((row, i) => (
                    <tr key={i} className="align-top">
                      <td className="p-2 border-t border-slate-100 font-semibold text-slate-700 bg-slate-50">{row.label}</td>
                      <td className="p-2 border-t border-slate-100 leading-relaxed text-slate-700">{row.content}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      }

      const matchesDiseaseTree = (drug) => {
        if (drugTab !== 'disease') return true;
        if (selectedDisease === 'Tất cả bệnh') return true;
        const aliases = diseaseAliases[selectedDisease] || [selectedDisease];
        const diseaseMatch = aliases.some(alias => normalized(textOf(drug)).includes(normalized(alias)));
        if (!diseaseMatch && selectedNode === 'Tất cả phân độ/biến chứng') return false;
        if (selectedNode === 'Tất cả phân độ/biến chứng') return diseaseMatch;
        return nameInList(drug, nodeDrugMap[selectedNode]);
      };

      const matchesProcedure = (drug) => {
        if (drugTab !== 'procedure') return true;
        if (selectedProcedure === 'Tất cả thủ thuật') return true;
        return nameInList(drug, procedureDrugMap[selectedProcedure]);
      };

      const q = normalized(query.trim());
      const filtered = drugs.filter(d => {
        const matchesCategory = category === 'Tất cả' || d.group === category;
        const haystack = normalized(textOf(d));
        return matchesCategory && matchesDiseaseTree(d) && matchesProcedure(d) && (!q || haystack.includes(q));
      });
      const currentNodeOptions = selectedDisease === 'Tất cả bệnh' ? ['Tất cả phân độ/biến chứng'] : diseaseTree[selectedDisease];

      return (
        <div className="space-y-4 pb-6">
          <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-3 space-y-3 sticky top-0 z-10">
            <div className="flex items-center gap-2 border border-slate-200 rounded-lg px-3 py-2 bg-slate-50">
              <IconSearch size={18} className="text-slate-400" />
              <input value={query} onChange={e => setQuery(e.target.value)} placeholder="Search thuốc, bệnh, liều, cách pha..." className="bg-transparent outline-none text-sm flex-1" />
            </div>

            <div className="grid grid-cols-2 gap-2">
              <select value={category} onChange={e => setCategory(e.target.value)} className="p-2 rounded-lg border border-slate-200 text-sm bg-white">
                {groups.map(g => <option key={g}>{g}</option>)}
              </select>
              <div className="grid grid-cols-2 rounded-lg border border-slate-200 overflow-hidden bg-slate-50 text-xs font-semibold">
                <button onClick={() => setDrugTab('disease')} className={`py-2 ${drugTab === 'disease' ? 'bg-blue-700 text-white' : 'text-slate-600'}`}>Bệnh</button>
                <button onClick={() => setDrugTab('procedure')} className={`py-2 border-l border-slate-200 ${drugTab === 'procedure' ? 'bg-blue-700 text-white' : 'text-slate-600'}`}>Thủ thuật</button>
              </div>
            </div>

            {drugTab === 'disease' ? (
              <div className="grid grid-cols-2 gap-2">
                <select value={selectedDisease} onChange={e => { setSelectedDisease(e.target.value); setSelectedNode('Tất cả phân độ/biến chứng'); }} className="p-2 rounded-lg border border-slate-200 text-sm bg-white">
                  {diseaseOptions.map(d => <option key={d}>{d}</option>)}
                </select>
                <select value={selectedNode} onChange={e => setSelectedNode(e.target.value)} className="p-2 rounded-lg border border-slate-200 text-sm bg-white">
                  {currentNodeOptions.map(n => <option key={n}>{n}</option>)}
                </select>
              </div>
            ) : (
              <select value={selectedProcedure} onChange={e => setSelectedProcedure(e.target.value)} className="w-full p-2 rounded-lg border border-slate-200 text-sm bg-white">
                {procedures.map(p => <option key={p}>{p}</option>)}
              </select>
            )}

            <div className="flex gap-2 overflow-x-auto scrollbar-hide">
              {drugTab === 'disease'
                ? ['Tay chân miệng', 'Độ 2a', 'Độ 3', 'Độ 4', 'Sởi', 'Viêm não', 'Nhiễm khuẩn'].map(tag => (
                    <button key={tag} onClick={() => { diseaseTree[tag] ? (setSelectedDisease(tag), setSelectedNode('Tất cả phân độ/biến chứng')) : setSelectedNode(tag); }} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs border bg-white text-slate-600 border-slate-200">{tag}</button>
                  ))
                : procedures.filter(p => p !== 'Tất cả thủ thuật').map(tag => (
                    <button key={tag} onClick={() => setSelectedProcedure(tag)} className={`flex-shrink-0 px-3 py-1.5 rounded-full text-xs border ${selectedProcedure === tag ? 'bg-blue-700 text-white border-blue-700' : 'bg-white text-slate-600 border-slate-200'}`}>{tag}</button>
                  ))}
            </div>
          </div>

          <div className="text-xs text-slate-500 space-y-1">
            <p>Tìm thấy {filtered.length} thuốc. Kiểm tra lại phác đồ bệnh viện, chức năng thận/gan và nồng độ thuốc trước khi kê/truyền.</p>
            <p className="font-medium text-slate-600">
              Cột 2 đang lọc theo: {drugTab === 'disease' ? `${selectedDisease} → ${selectedNode}` : `Thủ thuật → ${selectedProcedure}`}
            </p>
          </div>

          <div className="space-y-3">
            {filtered.map((drug, idx) => (
              <div key={idx} className="bg-white rounded-xl border border-slate-200 shadow-sm p-4">
                <div className="flex justify-between gap-2">
                  <div>
                    <h3 className="font-bold text-slate-800">{drug.name}</h3>
                    <p className="text-xs text-blue-700 font-semibold mt-0.5">{drug.group}</p>
                  </div>
                  <span className="text-xs bg-slate-100 text-slate-600 rounded-full px-2 py-1 h-max">{drug.route}</span>
                </div>
                <div className="mt-3 space-y-2 text-sm text-slate-700">
                  <DoseDisplay dose={drug.dose} />
                  <p><strong>Dung môi/cách pha:</strong> {drug.solvent}</p>
                  {drug.example && <p className="bg-amber-50 border border-amber-200 rounded-lg p-2 text-amber-900"><strong>Ví dụ:</strong> {drug.example}</p>}
                  <p><strong>Ghi chú:</strong> {drug.note}</p>
                </div>
                <div className="flex flex-wrap gap-1 mt-3">
                  {drug.diseases.map(tag => <span key={tag} className="text-xs bg-blue-50 text-blue-700 border border-blue-100 rounded-full px-2 py-1">{tag}</span>)}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // Mount App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ClinicalRoundsAssistant />);
  </script>
</body>
</html>
