<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trợ Lý Đi Buồng Lâm Sàng</title>

<!-- iOS icon đơn giản nhất -->
  <link rel="apple-touch-icon" href="icons/icon-1024.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Trợ Lý Đi Buồng">
  <meta name="theme-color" content="#1d4ed8">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (To compile JSX in browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Ẩn thanh cuộn nhưng vẫn cho phép cuộn */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    /* Padding an toàn cho các dòng điện thoại tai thỏ/không viền */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
  </style>
</head>
<body class="bg-slate-800 flex justify-center h-screen overflow-hidden m-0">
  
  <div id="root" class="w-full max-w-md h-full bg-slate-50 relative overflow-hidden flex flex-col shadow-2xl"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- ICON COMPONENTS (Nhúng trực tiếp để chạy offline) ---
    const IconActivity = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>);
    const IconClipboardList = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"></rect><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><path d="M12 11h4"></path><path d="M12 16h4"></path><path d="M8 11h.01"></path><path d="M8 16h.01"></path></svg>);
    const IconBrainCircuit = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 4.5a2.5 2.5 0 0 0-4.96-.46 2.5 2.5 0 0 0-1.98 3 2.5 2.5 0 0 0-1.32 4.24 3 3 0 0 0 .34 5.58 2.5 2.5 0 0 0 2.96 3.08 2.5 2.5 0 0 0 4.91.05L12 20V4.5Z"></path><path d="M16 8V5c0-1.1.9-2 2-2"></path><path d="M12 13h4"></path><path d="M12 17h6"></path><path d="M21 9h-4"></path><path d="M22 13h-2"></path><path d="M21 17h-3"></path></svg>);
    const IconSave = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>);
    const IconPill = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 0 0-7-7l-10 10a4.95 4.95 0 0 0 7 7Z"></path><path d="m8.5 8.5 7 7"></path></svg>);
    const IconSearch = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>);
    const IconTrash2 = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" x2="10" y1="11" y2="17"></line><line x1="14" x2="14" y1="11" y2="17"></line></svg>);
    const IconPlus = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>);
    const IconChevronDown = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>);
    const IconChevronUp = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>);
    const IconAlertTriangle = ({ size = 24, className = "" }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>);


    // --- ỨNG DỤNG CHÍNH ---
    function ClinicalRoundsAssistant() {
      const [activeTab, setActiveTab] = useState('sbar');

      return (
        <React.Fragment>
          {/* Header */}
          <header className="bg-blue-700 text-white p-4 shadow-md z-10 shrink-0">
            <h1 className="text-xl font-bold flex items-center gap-2">
              <IconActivity size={24} />
              Trợ Lý Đi Buồng
            </h1>
            <p className="text-blue-100 text-sm mt-1">Giao bệnh nhanh - Ra quyết định chuẩn</p>
          </header>

          {/* Main Content */}
          <main className="flex-grow p-4 overflow-y-auto pb-24 scrollbar-hide">
            {activeTab === 'sbar' && <SBARModule />}
            {activeTab === 'protocols' && <ProtocolModule />}
            {activeTab === 'drugs' && <DrugDatabaseModule />}
            {activeTab === 'pimping' && <PimpingModule />}
          </main>

          {/* Bottom Navigation */}
          <nav className="bg-white border-t border-slate-200 absolute bottom-0 w-full flex justify-around gap-1 p-2 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] z-20 shrink-0 pb-safe">
            <NavButton 
              icon={<IconClipboardList size={24} />}
              label="SBAR Giao Bệnh" 
              isActive={activeTab === 'sbar'} 
              onClick={() => setActiveTab('sbar')} 
            />
            <NavButton 
              icon={<IconActivity size={24} />} 
              label="Phác Đồ Nhanh" 
              isActive={activeTab === 'protocols'} 
              onClick={() => setActiveTab('protocols')} 
            />
            <NavButton 
              icon={<IconPill size={24} />} 
              label="Thuốc" 
              isActive={activeTab === 'drugs'} 
              onClick={() => setActiveTab('drugs')} 
            />
            <NavButton 
              icon={<IconBrainCircuit size={24} />} 
              label="Tư Duy (Anki)" 
              isActive={activeTab === 'pimping'} 
              onClick={() => setActiveTab('pimping')} 
            />
          </nav>
        </React.Fragment>
      );
    }

    function NavButton({ icon, label, isActive, onClick }) {
      return (
        <button 
          onClick={onClick}
          className={`flex flex-col items-center p-2 rounded-lg transition-colors flex-1 min-w-0 ${
            isActive ? 'text-blue-700 font-semibold' : 'text-slate-500 hover:text-blue-500'
          }`}
        >
          <div className={`${isActive ? 'scale-110' : ''} transition-transform`}>
            {icon}
          </div>
          <span className="text-xs mt-1">{label}</span>
        </button>
      );
    }

    /* ==========================================
       MODULE 1: SBAR HANDOVER
       ========================================== */
    function SBARModule() {
      const SBAR_STORAGE_KEY = 'clinicalRoundsAssistant_sbarPatients_v1';
      const defaultPatients = [
        {
          id: 1,
          bed: '12',
          name: 'Ngô Văn B',
          age: '65',
          situation: 'Bệnh nhân đang suy hô hấp cấp, nhịp thở 35 l/p, SpO2 88% (oxy mask túi 10L/p). Bệnh nhân bắt đầu lơ mơ, mệt cơ hô hấp.',
          background: 'Tiền sử Hen phế quản. Khởi phát ho khạc đàm vàng 2 ngày. Đã phun khí dung Salbutamol 3 lần + tiêm TM Methylprednisolone 40mg cách đây 1 giờ nhưng không đáp ứng.',
          assessment: 'Khám: Phổi ran rít ngáy 2 phế trường, co kéo cơ hô hấp phụ nhiều. Khí máu (15p trước): pH 7.25, PaCO2 65, PaO2 55. Đánh giá: Cơn hen phế quản cấp nguy kịch, toan hô hấp.',
          recommendation: 'Đề xuất: Đặt nội khí quản thở máy xâm nhập ngay. Đã chuẩn bị sẵn khay NKQ, Midazolam và thuốc dãn cơ. Xin ý kiến Trưởng khoa tiến hành.',
          watchOut: 'Canh sát tri giác và SpO2 mỗi 15 phút. Báo động ngay nếu ngưng thở hoặc SpO2 < 85%. Sẵn sàng bóp bóng.'
        }
      ];
      const [patients, setPatients] = useState(() => {
        try {
          const saved = localStorage.getItem(SBAR_STORAGE_KEY);
          if (saved) {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed)) return parsed;
          }
        } catch (error) {
          console.warn('Không đọc được dữ liệu SBAR đã lưu:', error);
        }
        return defaultPatients;
      });
      const [currentForm, setCurrentForm] = useState({
        id: null, bed: '', name: '', age: '', situation: '', background: '', assessment: '', recommendation: '', watchOut: ''
      });
      const [isEditing, setIsEditing] = useState(false);

      useEffect(() => {
        try {
          localStorage.setItem(SBAR_STORAGE_KEY, JSON.stringify(patients));
        } catch (error) {
          console.warn('Không lưu được dữ liệu SBAR:', error);
        }
      }, [patients]);

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setCurrentForm(prev => ({ ...prev, [name]: value }));
      };

      const savePatient = () => {
        if (!currentForm.name || !currentForm.bed) return alert('Vui lòng nhập Tên và Số giường!');
        if (currentForm.id) {
          setPatients(patients.map(p => p.id === currentForm.id ? currentForm : p));
        } else {
          setPatients([...patients, { ...currentForm, id: Date.now() }]);
        }
        resetForm();
      };

      const editPatient = (patient) => {
        setCurrentForm(patient);
        setIsEditing(true);
      };

      const deletePatient = (id) => {
        setPatients(patients.filter(p => p.id !== id));
      };

      const resetForm = () => {
        setCurrentForm({ id: null, bed: '', name: '', age: '', situation: '', background: '', assessment: '', recommendation: '', watchOut: '' });
        setIsEditing(false);
      };

      return (
        <div className="space-y-6 pb-6">
          {/* Patient List */}
          {patients.length > 0 && !isEditing && (
            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
              <button 
                onClick={() => setIsEditing(true)}
                className="flex-shrink-0 flex items-center justify-center w-12 h-12 bg-blue-100 text-blue-700 rounded-full shadow-sm"
              >
                <IconPlus size={24} />
              </button>
              {patients.map(p => (
                <button 
                  key={p.id} 
                  onClick={() => editPatient(p)}
                  className="flex-shrink-0 px-4 py-2 bg-white border border-slate-200 rounded-full shadow-sm text-sm font-medium text-slate-700 whitespace-nowrap"
                >
                  G.{p.bed} - {p.name}
                </button>
              ))}
            </div>
          )}

          {/* SBAR Form */}
          {(isEditing || patients.length === 0) && (
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="bg-slate-50 border-b border-slate-200 p-3 flex justify-between items-center">
                <h2 className="font-semibold text-slate-700">
                  {currentForm.id ? 'Sửa thông tin ca bệnh' : 'Thêm ca bệnh mới'}
                </h2>
                {patients.length > 0 && (
                  <button onClick={resetForm} className="text-slate-400 hover:text-slate-600">Hủy</button>
                )}
              </div>
              
              <div className="p-4 space-y-4">
                <div className="flex gap-2">
                  <input type="text" name="bed" placeholder="Giường..." value={currentForm.bed} onChange={handleInputChange} className="w-1/4 p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" />
                  <input type="text" name="name" placeholder="Họ tên BN..." value={currentForm.name} onChange={handleInputChange} className="w-2/4 p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" />
                  <input type="text" name="age" placeholder="Tuổi..." value={currentForm.age} onChange={handleInputChange} className="w-1/4 p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" />
                </div>

                <div className="space-y-3">
                  <SBARField letter="S" title="Situation (Tình huống)" placeholder="Vấn đề cấp bách ngay lúc này là gì?" name="situation" value={currentForm.situation} onChange={handleInputChange} color="bg-red-50 text-red-700 border-red-200" />
                  <SBARField letter="B" title="Background (Bối cảnh/Tiền sử)" placeholder="Tiền sử bệnh, can thiệp đã làm?" name="background" value={currentForm.background} onChange={handleInputChange} color="bg-orange-50 text-orange-700 border-orange-200" />
                  <SBARField letter="A" title="Assessment (Đánh giá)" placeholder="Khám LS, CLS nổi bật? Chẩn đoán sơ bộ?" name="assessment" value={currentForm.assessment} onChange={handleInputChange} color="bg-blue-50 text-blue-700 border-blue-200" />
                  <SBARField letter="R" title="Recommendation (Đề xuất)" placeholder="Bạn muốn xin ý kiến Trưởng khoa điều gì?" name="recommendation" value={currentForm.recommendation} onChange={handleInputChange} color="bg-green-50 text-green-700 border-green-200" />
                  <SBARField letter="W" title="Watch-out (Cần canh/Theo dõi)" placeholder="Dấu hiệu sinh tồn nào cần báo động ngay?" name="watchOut" value={currentForm.watchOut} onChange={handleInputChange} color="bg-purple-50 text-purple-700 border-purple-200" />
                </div>

                <div className="flex gap-2 pt-2">
                  <button onClick={savePatient} className="flex-1 bg-blue-600 text-white p-3 rounded-lg font-medium flex items-center justify-center gap-2 hover:bg-blue-700">
                    <IconSave size={18} /> Lưu Ca Bệnh
                  </button>
                  {currentForm.id && (
                    <button onClick={() => deletePatient(currentForm.id)} className="p-3 bg-red-100 text-red-600 rounded-lg hover:bg-red-200">
                      <IconTrash2 size={18} />
                    </button>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function SBARField({ letter, title, placeholder, name, value, onChange, color }) {
      return (
        <div className={`border rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-opacity-50 ${color.replace('bg-', 'focus-within:ring-').split(' ')[0]}`}>
          <div className={`px-3 py-1.5 flex items-center gap-2 border-b ${color}`}>
            <span className="font-bold text-lg">{letter}</span>
            <span className="font-medium text-sm">{title}</span>
          </div>
          <textarea name={name} value={value} onChange={onChange} placeholder={placeholder} rows={3} className="w-full p-3 text-sm focus:outline-none resize-none bg-white" />
        </div>
      );
    }

    /* ==========================================
       MODULE 2: QUICK PROTOCOLS
       ========================================== */
    function ProtocolModule() {
      const [mainMode, setMainMode] = useState('recognition');
      const [selectedDept, setSelectedDept] = useState('all');

      const departments = [
        { id: 'all', label: 'Tất cả', icon: '🏥' },
        { id: 'infectious', label: 'Nhiễm', icon: '🦠' },
        { id: 'neuro', label: 'Thần kinh', icon: '🧠' },
        { id: 'respiratory', label: 'Hô hấp', icon: '🫁' },
        { id: 'cardio', label: 'Tim mạch', icon: '❤️' },
        { id: 'icu', label: 'Hồi sức', icon: '⚙️' },
      ];

      const recognitionData = [
        {
          dept: 'infectious', type: 'warning', title: '🦠 Tay chân miệng - nhận diện, chẩn đoán, phân độ',
          content: <HFMDRecognition />
        },
        {
          dept: 'infectious', type: 'warning', title: '🦠 Sởi - nhận diện, chẩn đoán, biến chứng',
          content: <MeaslesRecognition />
        },
        {
          dept: 'neuro', type: 'danger', title: '🧠 Viêm não cấp / viêm màng não - nhận diện nguy cơ',
          content: <EncephalitisRecognition />
        },
        {
          dept: 'respiratory', type: 'info', title: '🫁 Dấu hiệu hô hấp cần báo động',
          content: (
            <div className="space-y-3 text-sm">
              <ActionBlock title="Báo bác sĩ / nâng bậc hỗ trợ hô hấp khi có" color="blue" items={[
                'SpO2 giảm hoặc dao động dù đã thở oxy.',
                'Thở nhanh, rút lõm ngực, thở rên, thở bụng, thở nông, cơn ngưng thở.',
                'Tím tái, vã mồ hôi, kiệt sức, lơ mơ hoặc mất phản xạ bảo vệ đường thở.',
                'Trong TCM độ 3: đáp ứng kém sau 30-60 phút thở oxy qua mũi là dấu hiệu cần cân nhắc đặt nội khí quản sớm.',
                'Trong sởi viêm phổi: khó thở hoặc SpO2 < 94% là mốc bắt đầu hỗ trợ oxy; thất bại oxy cannula thì nâng CPAP/HFNC; thất bại CPAP/HFNC thì đặt nội khí quản.'
              ]} />
            </div>
          )
        },
        {
          dept: 'icu', type: 'danger', title: '⚙️ Nhận diện ca cần hồi sức tích cực',
          content: (
            <div className="space-y-3 text-sm">
              <ActionBlock title="Chuyển hồi sức / hội chẩn hồi sức ngay" color="red" items={[
                'TCM độ 3 hoặc độ 4; TCM độ 2b nhóm 2 diễn tiến xấu hoặc không đáp ứng sau điều trị ban đầu.',
                'Sởi có viêm phổi suy hô hấp tiến triển, ARDS, viêm não, nhiễm khuẩn huyết, suy giảm miễn dịch hoặc bệnh nền nặng.',
                'Viêm não/viêm màng não có co giật kéo dài, rối loạn tri giác, GCS giảm, dấu thần kinh khu trú, sốc hoặc tăng áp lực nội sọ.',
                'Cần đặt nội khí quản, thở máy, vận mạch, theo dõi huyết áp động mạch xâm lấn, lọc máu liên tục hoặc ECMO.'
              ]} />
            </div>
          )
        }
      ];

      const protocolData = [
        {
          dept: 'infectious', type: 'warning', title: '🦠 Tay chân miệng - phác đồ xử trí theo phân độ',
          content: <HFMDProtocol />
        },
        {
          dept: 'infectious', type: 'warning', title: '🦠 Sởi - phác đồ xử trí theo mức độ / biến chứng',
          content: <MeaslesProtocol />
        },
        {
          dept: 'neuro', type: 'danger', title: '🧠 Viêm não cấp / nghi viêm màng não - phác đồ xử trí ban đầu',
          content: <EncephalitisProtocol />
        },
        {
          dept: 'icu', type: 'danger', title: '⚙️ Hồi sức - chỉ định nâng bậc và theo dõi',
          content: <ICUProtocol />
        }
      ];

      const filteredRecognition = recognitionData.filter(item => selectedDept === 'all' || item.dept === selectedDept || (selectedDept === 'cardio' && item.title.includes('Tay chân miệng')) || (selectedDept === 'respiratory' && (item.title.includes('Sởi') || item.title.includes('Tay chân miệng'))));
      const filteredProtocols = protocolData.filter(item => selectedDept === 'all' || item.dept === selectedDept || (selectedDept === 'icu' && item.title.includes('Tay chân miệng')) || (selectedDept === 'respiratory' && item.title.includes('Sởi')) || (selectedDept === 'cardio' && item.title.includes('Tay chân miệng')));

      return (
        <div className="space-y-4">
          <div className="bg-yellow-50 text-yellow-800 p-3 rounded-lg border border-yellow-200 flex gap-2 items-start text-sm">
            <IconAlertTriangle className="flex-shrink-0 mt-0.5" size={18} />
            <p><strong>Cách dùng:</strong> Nhận diện chứa chẩn đoán, dấu hiệu nặng, phân độ. Phác đồ chỉ chứa xử trí, thuốc cần dùng, thời điểm đánh giá lại và tiêu chí nâng bậc; không ghi chi tiết liều.</p>
          </div>

          <div className="grid grid-cols-2 gap-2 bg-white p-2 rounded-xl border border-slate-200 shadow-sm">
            <button onClick={() => setMainMode('recognition')} className={`p-3 rounded-lg font-semibold text-sm ${mainMode === 'recognition' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'}`}>1. Nhận diện</button>
            <button onClick={() => setMainMode('protocols')} className={`p-3 rounded-lg font-semibold text-sm ${mainMode === 'protocols' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'}`}>2. Phác đồ xử trí</button>
          </div>

          <div className="flex gap-2 overflow-x-auto pb-1 scrollbar-hide">
            {departments.map(d => (
              <button key={d.id} onClick={() => setSelectedDept(d.id)} className={`flex-shrink-0 px-3 py-2 rounded-full text-sm border ${selectedDept === d.id ? 'bg-blue-700 text-white border-blue-700' : 'bg-white text-slate-700 border-slate-200'}`}>
                <span className="mr-1">{d.icon}</span>{d.label}
              </button>
            ))}
          </div>

          {mainMode === 'recognition' ? (
            <div className="space-y-3">
              {filteredRecognition.map(item => <AccordionItem key={item.title} title={item.title} type={item.type}>{item.content}</AccordionItem>)}
            </div>
          ) : (
            <div className="space-y-3">
              {filteredProtocols.map(p => <AccordionItem key={p.title} title={p.title} type={p.type}>{p.content}</AccordionItem>)}
            </div>
          )}
        </div>
      );
    }

    function ProtocolSubHeader({ title }) {
      return <div className="font-bold text-slate-800 bg-white border border-slate-200 rounded-lg px-3 py-2 shadow-sm">{title}</div>;
    }

    function ActionBlock({ title, items, color = 'slate' }) {
      const styles = {
        green: 'bg-green-50 border-green-200 text-green-900',
        yellow: 'bg-yellow-50 border-yellow-200 text-yellow-900',
        orange: 'bg-orange-50 border-orange-200 text-orange-900',
        red: 'bg-red-50 border-red-200 text-red-900',
        purple: 'bg-purple-50 border-purple-200 text-purple-900',
        blue: 'bg-blue-50 border-blue-200 text-blue-900',
        slate: 'bg-slate-50 border-slate-200 text-slate-900'
      };
      return (
        <div className={`rounded-xl border p-3 ${styles[color] || styles.slate}`}>
          <p className="font-bold mb-2">{title}</p>
          <ul className="list-disc pl-5 space-y-1 leading-relaxed">
            {items.map((it, idx) => <li key={idx}>{it}</li>)}
          </ul>
        </div>
      );
    }

    function GradeCard({ grade, title, color = 'slate', children }) {
      const styles = {
        green: 'border-green-300 bg-green-50 text-green-900',
        yellow: 'border-yellow-300 bg-yellow-50 text-yellow-900',
        orange: 'border-orange-300 bg-orange-50 text-orange-900',
        red: 'border-red-300 bg-red-50 text-red-900',
        purple: 'border-purple-300 bg-purple-50 text-purple-900',
        blue: 'border-blue-300 bg-blue-50 text-blue-900',
        slate: 'border-slate-300 bg-slate-50 text-slate-900'
      };
      const badge = {
        green: 'bg-green-600', yellow: 'bg-yellow-500', orange: 'bg-orange-600', red: 'bg-red-600', purple: 'bg-purple-600', blue: 'bg-blue-600', slate: 'bg-slate-600'
      };
      return (
        <div className={`rounded-xl border-l-8 p-3 ${styles[color] || styles.slate}`}>
          <div className="flex items-start gap-2 mb-2">
            <span className={`text-white text-xs font-bold rounded-full px-2 py-1 ${badge[color] || badge.slate}`}>{grade}</span>
            <p className="font-bold leading-snug">{title}</p>
          </div>
          <div className="text-sm leading-relaxed space-y-2">{children}</div>
        </div>
      );
    }

    function SourceNote({ items }) {
      return (
        <div className="mt-3 bg-white border border-slate-200 rounded-lg p-3 text-xs text-slate-600 leading-relaxed">
          <p className="font-bold text-slate-700 mb-1">Nguồn:</p>
          <ul className="list-disc pl-4 space-y-1">
            {items.map((it, idx) => <li key={idx}>{it}</li>)}
          </ul>
        </div>
      );
    }

    function HFMDRecognition() {
      return (
        <div className="space-y-3 text-sm">
          <ProtocolSubHeader title="Nhận diện ca bệnh" />
          <ActionBlock color="blue" title="Gợi ý tay chân miệng" items={[
            'Dịch tễ: thường gặp trẻ dưới 5 tuổi, có thể thành dịch; lây chủ yếu đường tiêu hóa.',
            'Tổn thương da-niêm mạc: loét miệng hoặc phỏng nước/hồng ban ở lòng bàn tay, lòng bàn chân, gối, mông, khuỷu tay.',
            'Biến chứng thần kinh, tim mạch, hô hấp thường xuất hiện sớm ngày 2-5, có thể đến ngày 7.',
            'Giật mình chới với là dấu hiệu quan trọng báo biến chứng thần kinh; sốt cao hoặc nôn nhiều làm tăng nguy cơ diễn tiến nặng.',
            'Chẩn đoán xác định: RT-PCR hoặc phân lập được vi rút đường ruột khi có điều kiện.'
          ]} />

          <ProtocolSubHeader title="Phân độ màu" />
          <GradeCard grade="Độ 1" title="Không biến chứng" color="green">
            <ul className="list-disc pl-5 space-y-1">
              <li>Chỉ có tổn thương da-niêm mạc, sốt nhẹ hoặc không sốt.</li>
              <li>Không có dấu hiệu thần kinh, tim mạch, hô hấp.</li>
            </ul>
          </GradeCard>
          <GradeCard grade="Độ 2a" title="Có biến chứng thần kinh nhẹ" color="yellow">
            <ul className="list-disc pl-5 space-y-1">
              <li>Bệnh sử có giật mình dưới 2 lần/30 phút và lúc khám không ghi nhận.</li>
              <li>Hoặc sốt trên 39°C / sốt trên 2 ngày kèm nôn ói nhiều, lừ đừ, khó ngủ, quấy khóc vô cớ.</li>
            </ul>
          </GradeCard>
          <GradeCard grade="Độ 2b - nhóm 1" title="Biến chứng thần kinh nặng nhóm 1" color="orange">
            <ul className="list-disc pl-5 space-y-1">
              <li>Giật mình ghi nhận lúc khám.</li>
              <li>Hoặc bệnh sử giật mình ≥ 2 lần/30 phút.</li>
              <li>Hoặc bệnh sử giật mình kèm ngủ gà hoặc mạch nhanh &gt;130 lần/phút khi không sốt.</li>
            </ul>
          </GradeCard>
          <GradeCard grade="Độ 2b - nhóm 2" title="Biến chứng thần kinh nặng nhóm 2" color="red">
            <ul className="list-disc pl-5 space-y-1">
              <li>Nhóm 1 kèm sốt cao ≥39°C không đáp ứng thuốc hạ sốt.</li>
              <li>Mạch nhanh &gt;150 lần/phút khi không sốt.</li>
              <li>Thất điều, run chi/run người, đi loạng choạng.</li>
              <li>Rung giật nhãn cầu, lác mắt, yếu/liệt chi, liệt thần kinh sọ, nuốt sặc, đổi giọng.</li>
              <li>Tăng trương lực cơ hoặc rối loạn tri giác.</li>
            </ul>
          </GradeCard>
          <GradeCard grade="Độ 3" title="Rối loạn thần kinh thực vật nặng" color="red">
            <ul className="list-disc pl-5 space-y-1">
              <li>Mạch nhanh &gt;170 lần/phút khi không sốt; một số ca có thể mạch chậm, phải đánh giá HA và tri giác.</li>
              <li>Huyết áp tâm thu tăng theo tuổi.</li>
              <li>Thở nhanh, khó thở, thở rít hoặc SpO2 &lt;94%.</li>
              <li>Da nổi bông/vân tím, vã mồ hôi, chi lạnh.</li>
            </ul>
          </GradeCard>
          <GradeCard grade="Độ 4" title="Suy hô hấp - tuần hoàn nặng" color="purple">
            <ul className="list-disc pl-5 space-y-1">
              <li>Ngưng thở hoặc rối loạn nhịp thở.</li>
              <li>Tím tái hoặc SpO2 &lt;92%.</li>
              <li>Phù phổi cấp.</li>
              <li>Sốc: mạch không bắt được/HA không đo được, tụt HA hoặc HA kẹp.</li>
            </ul>
          </GradeCard>
          <SourceNote items={['Bộ Y tế, Quyết định 292/QĐ-BYT 2024: Hướng dẫn chẩn đoán, điều trị bệnh Tay chân miệng.']} />
        </div>
      );
    }

    function MeaslesRecognition() {
      return (
        <div className="space-y-3 text-sm">
          <ProtocolSubHeader title="Nhận diện sởi" />
          <ActionBlock color="blue" title="Thể điển hình qua 4 giai đoạn" items={[
            'Ủ bệnh 7-21 ngày, trung bình khoảng 10 ngày.',
            'Khởi phát 2-4 ngày: sốt cao, ho, chảy mũi, viêm kết mạc; có thể thấy hạt Koplik ở niêm mạc má.',
            'Toàn phát 2-5 ngày: ban dát sẩn xuất hiện sau tai, sau gáy, trán, mặt, cổ rồi lan thân mình và tứ chi; khi ban mọc hết thì sốt giảm dần.',
            'Hồi phục: ban sẫm màu, bong vảy phấn, để lại vết thâm vằn da hổ; có thể ho kéo dài 1-2 tuần.',
            'Chẩn đoán xác định: ca nghi ngờ/lâm sàng và IgM hoặc PCR dương tính với sởi.'
          ]} />
          <ProtocolSubHeader title="Yếu tố nguy cơ nặng" />
          <ActionBlock color="orange" title="Nguy cơ diễn tiến nặng" items={[
            'Trẻ dưới 12 tháng.',
            'Chưa tiêm vắc xin hoặc tiêm không đầy đủ.',
            'Suy giảm miễn dịch, bệnh nền nặng, suy dinh dưỡng nặng, thiếu vitamin A.',
            'Phụ nữ mang thai.'
          ]} />
          <ProtocolSubHeader title="Dấu cần tái khám ngay / nhập viện" />
          <ActionBlock color="red" title="Dấu nặng" items={[
            'Không ăn uống được hoặc bỏ bú.',
            'Nôn mọi thứ.',
            'Tím tái.',
            'Thở nhanh, khó thở, SpO2 thấp.',
            'Rối loạn tri giác, co giật hoặc nghi viêm não.',
            'Biến chứng: viêm tai giữa, viêm kết mạc mủ, viêm loét giác mạc, viêm miệng/loét miệng, viêm thanh khí phế quản, viêm phổi, ARDS, nhiễm khuẩn huyết, viêm não.'
          ]} />
          <SourceNote items={['Bộ Y tế, Quyết định 1019/QĐ-BYT 2025: Hướng dẫn chẩn đoán và điều trị bệnh Sởi.']} />
        </div>
      );
    }

    function EncephalitisRecognition() {
      return (
        <div className="space-y-3 text-sm">
          <ProtocolSubHeader title="Nhận diện viêm não / viêm màng não" />
          <ActionBlock color="red" title="Nghi viêm não cấp khi" items={[
            'Sốt hoặc bệnh nhiễm trùng kèm rối loạn tri giác, thay đổi hành vi, lơ mơ/hôn mê.',
            'Co giật mới xuất hiện, co giật kéo dài hoặc co giật tái diễn.',
            'Dấu thần kinh khu trú: yếu/liệt, thất ngôn, liệt dây sọ, thất điều.',
            'Đau đầu, nôn, cổ gượng, sợ ánh sáng hoặc dấu màng não.',
            'HSV-1 cần nghĩ sớm khi sốt + rối loạn tri giác >24 giờ, co giật mới, dấu thần kinh khu trú; tổn thương thái dương/ổ mắt-trán trên MRI càng gợi ý.'
          ]} />
          <ProtocolSubHeader title="Dấu nguy cơ tăng áp lực nội sọ / cần hồi sức" />
          <ActionBlock color="purple" title="Báo động" items={[
            'GCS giảm nhanh hoặc GCS <10.',
            'Đồng tử bất thường, phù gai thị, dấu thần kinh khu trú tiến triển.',
            'Nhịp thở bất thường, cơn ngưng thở, tụt SpO2.',
            'Tăng huyết áp kèm mạch chậm, dấu thoát vị não.',
            'Sốc, rối loạn điện giải nặng, hạ đường huyết hoặc co giật không cắt được.'
          ]} />
          <ProtocolSubHeader title="Cận lâm sàng định hướng" />
          <ActionBlock color="blue" title="Không trì hoãn điều trị khi chờ xét nghiệm" items={[
            'Dịch não tủy: tế bào, protein, glucose, tỷ lệ glucose DNT/máu, Gram, cấy, PCR tác nhân phù hợp.',
            'Cấy máu trước kháng sinh nếu không làm chậm điều trị.',
            'MRI não ưu tiên khi có điều kiện; EEG giúp đánh giá co giật dưới lâm sàng hoặc bệnh não.',
            'Xét nghiệm theo vùng dịch tễ: HSV/VZV, vi khuẩn thường gặp, lao, sốt rét, JEV, dengue, EV71, enterovirus, cúm; cân nhắc tự miễn nếu nhiễm trùng không giải thích được.'
          ]} />
          <SourceNote items={['WHO 2025: Encephalitis - Global threats, trends and public health implications.', 'WHO 2025: Guidelines on meningitis diagnosis, treatment and care.', 'UpToDate 2026: Herpes simplex virus type 1 encephalitis.']} />
        </div>
      );
    }

    function HFMDProtocol() {
      return (
        <div className="space-y-3 text-sm">
          <GradeCard grade="Độ 1" title="Không biến chứng - điều trị ngoại trú nếu đủ điều kiện" color="green">
            <ActionBlock color="green" title="Xử trí" items={[
              'Hạ sốt, giảm đau bằng Paracetamol; có thể phối hợp Ibuprofen khi sốt cao không đáp ứng tốt và không có chống chỉ định.',
              'Không dùng Aspirin.',
              'Bù nước, dinh dưỡng mềm/lỏng, vệ sinh miệng và da.',
              'Hướng dẫn người nhà dấu chuyển độ: giật mình, sốt cao, nôn nhiều, lừ đừ, thở nhanh/khó thở, tím tái, co giật.',
              'Tái khám sau 1-2 ngày hoặc ngay khi có dấu nặng; trẻ dưới 12 tháng hoặc có bệnh kèm nên chuyển tuyến/nhập viện theo điều kiện.'
            ]} />
          </GradeCard>

          <GradeCard grade="Độ 2a" title="Nhập viện / theo dõi sát" color="yellow">
            <ActionBlock color="yellow" title="Xử trí" items={[
              'Điều trị hỗ trợ như độ 1.',
              'Dùng Phenobarbital uống để giảm kích thích thần kinh theo phác đồ đơn vị.',
              'Theo dõi mạch, nhiệt độ, nhịp thở, tri giác, SpO2 mỗi 6-12 giờ; mọi trẻ mạch nhanh hoặc chậm phải đo huyết áp.',
              'Cho nằm khu theo dõi bệnh nặng trong 24 giờ đầu nếu có yếu tố nguy cơ: li bì, sốt trên 3 ngày, sốt cao >39°C, còn giật mình 24-72 giờ trước đó, nôn ói nhiều, đường huyết tăng, bạch cầu tăng hoặc tiểu cầu tăng.',
              'Chuyển tuyến/hội chẩn nếu xuất hiện tiêu chuẩn độ 2b trở lên hoặc bệnh phối hợp.'
            ]} />
          </GradeCard>

          <GradeCard grade="Độ 2b" title="Cấp cứu / hồi sức: thần kinh nặng" color="orange">
            <ActionBlock color="orange" title="Xử trí ban đầu" items={[
              'Sắp xếp điều trị tại phòng cấp cứu hoặc hồi sức.',
              'Nằm đầu cao 30°.',
              'Thở oxy qua mũi nếu cần, tối đa theo phác đồ.',
              'Hạ sốt tích cực khi sốt.',
              'Dùng Phenobarbital truyền tĩnh mạch; đánh giá lại đáp ứng sau điều trị.',
              'Immunoglobulin: chỉ định ngay cho độ 2b nhóm 2; nhóm 1 chưa chỉ định thường quy.',
              'Nếu nhóm 1 không giảm triệu chứng sau 6 giờ điều trị Phenobarbital hoặc vẫn giật mình liên tục/bứt rứt không yên: xem xét Immunoglobulin và theo dõi chuyển độ 3.',
              'Chống phù não khi độ 2b nhóm 2: đầu cao, hạn chế dịch, cân nhắc thở máy/tăng thông khí, Mannitol hoặc Natriclorid 3% theo chỉ định.',
              'Theo dõi mạch, nhiệt độ, huyết áp, nhịp thở, kiểu thở, tri giác, ran phổi, SpO2 mỗi 1-3 giờ trong 6 giờ đầu, sau đó 4-6 giờ/lần.'
            ]} />
          </GradeCard>

          <GradeCard grade="Độ 3" title="Hồi sức tích cực: rối loạn thần kinh thực vật nặng" color="red">
            <ActionBlock color="red" title="Oxy - đặt nội khí quản" items={[
              'Thở oxy qua mũi tối đa theo phác đồ; sau 30-60 phút nếu đáp ứng kém nên đặt nội khí quản giúp thở sớm.',
              'Đặt nội khí quản ngay nếu độ 3 kèm: thở bất thường, thở nhanh khi nằm yên không sốt, SpO2 dao động, xanh tái/vã mồ hôi, mạch rất nhanh, gồng chi hoặc hôn mê.',
              'Độ 4 là chỉ định đặt nội khí quản/thở máy bắt buộc.'
            ]} />
            <ActionBlock color="red" title="Thuốc và điều chỉnh" items={[
              'Phenobarbital truyền tĩnh mạch; lặp lại theo đáp ứng và giới hạn phác đồ.',
              'Immunoglobulin truyền tĩnh mạch; liều thứ hai chỉ xem xét sau 24 giờ nếu diễn biến nặng hơn.',
              'Dobutamin khi suy tim mạch với mạch nhanh >170 lần/phút và không tăng huyết áp; không dùng Dopamin cho chỉ định này.',
              'Milrinone khi có tăng huyết áp theo ngưỡng tuổi; giảm dần khi huyết áp ổn định 12-24 giờ; ngưng ngay nếu tụt huyết áp theo ngưỡng.',
              'Điều chỉnh rối loạn nước, điện giải, toan kiềm và hạ đường huyết.'
            ]} />
            <ActionBlock color="red" title="Sốt cao, co giật, lọc máu" items={[
              'Hạ sốt tích cực khi sốt cao liên tục không đáp ứng Paracetamol + Ibuprofen + lau mát sau 12 giờ.',
              'Nếu đang thở máy và còn sốt rất cao: rửa dạ dày bằng NaCl lạnh, có thể phối hợp thụt tháo NaCl lạnh.',
              'Nếu vẫn sốt rất cao sau 4-6 giờ các biện pháp trên: xem xét Methylprednisolone, theo dõi sát huyết áp; tối đa 3 ngày.',
              'Co giật: dùng Midazolam hoặc Diazepam, lặp lại sau 10 phút nếu còn co giật, tối đa 3 lần theo phác đồ.',
              'Theo dõi huyết áp động mạch xâm lấn khi độ 3 có vận mạch hoặc đặt nội khí quản.',
              'Lọc máu liên tục khi độ 3/4 đang thở máy kèm sốc không đáp ứng sau 1-2 giờ, sốt cao thất bại sau 6-12 giờ, hoặc mạch >180 không sốt kèm da nổi bông dù HA bình thường/tăng.'
            ]} />
          </GradeCard>

          <GradeCard grade="Độ 4" title="Hồi sức tối cấp: suy hô hấp - tuần hoàn" color="purple">
            <ActionBlock color="purple" title="Xử trí chính" items={[
              'Đặt nội khí quản và thở máy ngay.',
              'An thần khi đặt nội khí quản bằng Midazolam, Diazepam hoặc Fentanyl theo phác đồ; không dùng Ketamin vì nguy cơ tăng áp lực nội sọ.',
              'Mục tiêu thở máy: oxy hóa đủ, kiểm soát CO2, tránh áp lực đỉnh quá cao theo phác đồ hồi sức.',
              'Chống sốc do viêm cơ tim hoặc tổn thương trung tâm vận mạch: thiết lập đường truyền, hỗ trợ vận mạch/tăng co bóp theo huyết động, theo dõi tưới máu, nước tiểu, lactate nếu có.',
              'Phù phổi cấp: ngừng/giảm dịch, tăng hỗ trợ hô hấp, điều chỉnh vận mạch/tăng co bóp, theo dõi ran phổi và SpO2 liên tục.',
              'Cân nhắc Immunoglobulin, lọc máu liên tục hoặc ECMO VA khi sốc/suy tuần hoàn không đáp ứng hồi sức tối ưu tại đơn vị đủ điều kiện.'
            ]} />
          </GradeCard>
          <SourceNote items={['Bộ Y tế, Quyết định 292/QĐ-BYT 2024: Hướng dẫn chẩn đoán, điều trị bệnh Tay chân miệng.']} />
        </div>
      );
    }

    function MeaslesProtocol() {
      return (
        <div className="space-y-3 text-sm">
          <GradeCard grade="Sởi không biến chứng" title="Có thể điều trị ngoại trú" color="green">
            <ActionBlock color="green" title="Xử trí" items={[
              'Cách ly tại nhà: phòng riêng, hạn chế tiếp xúc, đeo khẩu trang thường xuyên.',
              'Uống Vitamin A liều cao cho tất cả trẻ bị sởi: 2 lần cách nhau 24 giờ; nếu thiếu vitamin A hoặc suy dinh dưỡng nặng thì bổ sung liều thứ ba sau 4-6 tuần.',
              'Hạ sốt bằng Paracetamol hoặc Ibuprofen khi sốt; lau mát khi sốt co giật.',
              'Đảm bảo dinh dưỡng theo tuổi, tiếp tục bú mẹ.',
              'Vệ sinh da, mắt, mũi, miệng.',
              'Tái khám mỗi 2-3 ngày đến khi hết sốt; khám ngay nếu không ăn uống được/bỏ bú, nôn mọi thứ, tím tái, thở nhanh hoặc rối loạn tri giác.',
              'Nghỉ học/không đến nơi công cộng ít nhất 4 ngày sau phát ban.'
            ]} />
          </GradeCard>

          <GradeCard grade="Sởi có biến chứng" title="Xem xét nhập viện và cách ly khu riêng" color="orange">
            <ActionBlock color="orange" title="Nguyên tắc chung" items={[
              'Điều trị tại khu cách ly riêng, tuân thủ phòng ngừa chuẩn và phòng ngừa lây truyền qua không khí/giọt bắn/tiếp xúc.',
              'Uống Vitamin A như sởi không biến chứng.',
              'Dinh dưỡng đầy đủ, chăm sóc tai, mắt, mũi, miệng, da.',
              'Hỗ trợ hô hấp ngay khi có suy hô hấp; theo dõi SpO2 và công thở.',
              'Chuyển tuyến nếu viêm phổi cần thở oxy, viêm não, nhiễm khuẩn huyết, suy giảm miễn dịch hoặc bệnh nền nặng.'
            ]} />
            <ActionBlock color="yellow" title="Tai - mắt - miệng" items={[
              'Viêm tai giữa cấp: rửa tai/làm khô tai nếu chảy mủ; giảm đau/hạ sốt; Amoxicillin hoặc Amoxicillin-acid clavulanic uống.',
              'Viêm kết mạc mủ: rửa/lau mắt bằng Natriclorua 0,9%; kháng sinh nhỏ/tra mắt như Ciprofloxacin, Ofloxacin hoặc Levofloxacin.',
              'Viêm loét giác mạc: chuyển chuyên khoa mắt; dùng Amoxicillin-acid clavulanic uống hoặc Cefotaxim/Ceftriaxon tĩnh mạch; vệ sinh mắt; không dùng chế phẩm tra/nhỏ mắt có corticoid.',
              'Viêm miệng/loét miệng: súc miệng NaCl 0,9%, đánh răng sau ăn và ít nhất 4 lần/ngày; thức ăn để nguội; loét miệng dùng Amoxicillin kèm Metronidazol; Candida dùng Nystatin.'
            ]} />
            <ActionBlock color="red" title="Thanh khí phế quản - viêm phổi" items={[
              'Viêm thanh khí phế quản: hỗ trợ hô hấp tùy mức độ; khí dung Adrenalin khi co thắt/phù nề thanh khí quản; có thể phun khí dung corticoid.',
              'Viêm phổi: nếu khó thở hoặc SpO2 <94% thì thở oxy cannula.',
              'Thất bại oxy cannula: thở NCPAP; nếu không có NCPAP có thể xem xét HFNC.',
              'Thất bại oxy/NCPAP: đặt nội khí quản và thở máy xâm nhập.',
              'Kháng sinh ban đầu viêm phổi cộng đồng: Amoxicillin-acid clavulanic uống hoặc Cefotaxim/Ceftriaxon tĩnh mạch.',
              'Nếu thất bại oxy cannula hoặc nghi tụ cầu: phối hợp Oxacillin/Cloxacillin khi nghi MSSA hoặc Vancomycin khi nghi MRSA.',
              'Sau 48 giờ không đáp ứng: điều chỉnh theo vi sinh/kháng sinh đồ; cân nhắc Cefotaxim/Ceftriaxon + Vancomycin hoặc kháng Pseudomonas/carbapenem/Linezolid tùy bối cảnh.',
              'Viêm phổi nặng ARDS tiến triển nhanh: xem xét IVIG; ECMO khi hồi sức thông lệ không hiệu quả kèm suy tuần hoàn/suy đa tạng tại đơn vị đủ điều kiện.'
            ]} />
            <ActionBlock color="purple" title="Viêm não cấp tính do sởi" items={[
              'Chống co giật bằng Diazepam theo phác đồ.',
              'Chống phù não nếu có: đầu cao 30° và cổ thẳng nếu không tụt HA.',
              'Thở oxy cannula; đặt nội khí quản sớm để thở máy khi Glasgow <10 điểm.',
              'Hạn chế dịch còn 75% nhu cầu cơ bản.',
              'Dùng Natriclorua 3% hoặc Mannitol khi có phù não/tăng áp lực nội sọ theo phác đồ.',
              'Truyền IVIG; cân nhắc corticoid toàn thân khi có chỉ định.'
            ]} />
            <ActionBlock color="red" title="Chỉ định IVIG trong sởi" items={[
              'Tình trạng nhiễm trùng nặng kèm bằng chứng tăng đáp ứng viêm.',
              'Suy hô hấp tiến triển nhanh.',
              'Viêm não.'
            ]} />
          </GradeCard>
          <SourceNote items={['Bộ Y tế, Quyết định 1019/QĐ-BYT 2025: Hướng dẫn chẩn đoán và điều trị bệnh Sởi.']} />
        </div>
      );
    }

    function EncephalitisProtocol() {
      return (
        <div className="space-y-3 text-sm">
          <GradeCard grade="0-10 phút" title="Ổn định ban đầu" color="red">
            <ActionBlock color="red" title="ABCDE" items={[
              'Gọi hỗ trợ, đưa vào khu cấp cứu/hồi sức nếu rối loạn tri giác, co giật, sốc hoặc suy hô hấp.',
              'Đảm bảo đường thở, hút đàm, oxy, monitor, SpO2, HA, nhiệt độ.',
              'Đường truyền tĩnh mạch; kiểm tra đường huyết mao mạch và sửa hạ đường huyết ngay.',
              'Cắt cơn co giật nếu có bằng benzodiazepine; nếu tái diễn/kéo dài, dùng thuốc chống co giật hàng hai như Phenobarbital/Phenytoin/Levetiracetam theo phác đồ đơn vị.',
              'Hạ sốt, giảm đau, bù dịch hợp lý; tránh hạ natri máu.'
            ]} />
          </GradeCard>

          <GradeCard grade="Trong 1 giờ" title="Kháng virus/kháng sinh kinh nghiệm không chờ đủ xét nghiệm" color="orange">
            <ActionBlock color="orange" title="Thuốc cần dùng theo chỉ định" items={[
              'Acyclovir/Aciclovir tĩnh mạch sớm khi nghi viêm não HSV/VZV hoặc viêm não cấp chưa loại trừ HSV; chỉnh theo chức năng thận và đảm bảo bù dịch.',
              'Nếu chưa loại trừ viêm màng não vi khuẩn: dùng Ceftriaxone hoặc Cefotaxime tĩnh mạch càng sớm càng tốt.',
              'Thêm Ampicillin hoặc Amoxicillin khi có yếu tố nguy cơ Listeria: trẻ nhỏ theo phác đồ địa phương, người >60 tuổi, thai kỳ hoặc suy giảm miễn dịch/bệnh nền phù hợp.',
              'Cân nhắc Vancomycin nếu vùng có phế cầu kháng penicillin/cephalosporin thế hệ 3 hoặc bệnh cảnh nặng theo khuyến cáo địa phương.',
              'Corticosteroid tĩnh mạch dùng cùng liều kháng sinh đầu khi nghi viêm màng não vi khuẩn trong bối cảnh phù hợp; ngưng nếu DNT không phù hợp viêm màng não vi khuẩn hoặc tác nhân không còn chỉ định.'
            ]} />
          </GradeCard>

          <GradeCard grade="Chẩn đoán" title="Làm sớm nhưng không làm chậm điều trị" color="blue">
            <ActionBlock color="blue" title="Cận lâm sàng" items={[
              'Chọc dò dịch não tủy càng sớm càng tốt, ưu tiên trước kháng sinh/acyclovir nếu không làm chậm điều trị và không có chống chỉ định.',
              'DNT: tế bào, protein, glucose, tỷ lệ glucose DNT/máu, Gram, cấy, PCR HSV/VZV/enterovirus và tác nhân theo dịch tễ.',
              'Cấy máu trước kháng sinh nếu thực hiện được ngay.',
              'Không chụp sọ não thường quy trước chọc dò. Chỉ chụp trước chọc dò khi GCS <10, dấu thần kinh khu trú, liệt dây sọ, phù gai thị, co giật mới ở người lớn hoặc suy giảm miễn dịch nặng.',
              'Nếu phải trì hoãn chọc dò hoặc chụp sọ: lấy máu/cấy máu và khởi điều trị ngay.',
              'MRI não khi có điều kiện, đặc biệt nghi HSV hoặc tổn thương khu trú; EEG nếu nghi co giật dưới lâm sàng/trạng thái động kinh không co giật.'
            ]} />
          </GradeCard>

          <GradeCard grade="Theo diễn tiến" title="Điều chỉnh điều trị và biến chứng" color="purple">
            <ActionBlock color="purple" title="Điều chỉnh" items={[
              'Khi có PCR/cấy/kháng sinh đồ: thu hẹp hoặc tối ưu kháng sinh/kháng virus.',
              'Nếu nghi viêm não tự miễn sau khi đã xử trí nhiễm trùng nguy hiểm: hội chẩn thần kinh, cân nhắc Methylprednisolone, IVIG hoặc thay huyết tương; tìm u liên quan khi phù hợp.',
              'Tăng áp lực nội sọ: đầu cao, cổ thẳng, tránh sốt/co giật/hạ oxy/tăng CO2; dùng Mannitol hoặc Natriclorid ưu trương như biện pháp tạm thời khi có dấu thoát vị hoặc phù não nặng.',
              'Không hạn chế dịch thường quy trong viêm màng não vi khuẩn; dùng dịch đẳng trương khi cần truyền tĩnh mạch, hạn chế vừa phải nếu nghi SIADH và không sốc/giảm thể tích.',
              'Co giật cấp do viêm màng não/viêm não: duy trì thuốc chống co giật theo nguy cơ; nếu không tái phát, cân nhắc ngưng trong vòng tối đa 3 tháng theo khuyến cáo và hội chẩn.',
              'Trước xuất viện: đánh giá di chứng thần kinh, vận động, nuốt, nhận thức; viêm màng não cần sàng lọc thính lực trước xuất viện hoặc trong 4 tuần sau xuất viện.'
            ]} />
          </GradeCard>
          <SourceNote items={['WHO 2025: Encephalitis - Global threats, trends and public health implications.', 'WHO 2025: Guidelines on meningitis diagnosis, treatment and care.', 'UpToDate 2026: Herpes simplex virus type 1 encephalitis.']} />
        </div>
      );
    }

    function ICUProtocol() {
      return (
        <div className="space-y-3 text-sm">
          <ActionBlock color="red" title="Khi nào gọi hồi sức ngay" items={[
            'TCM độ 3-4, đặc biệt có chỉ định đặt nội khí quản, vận mạch, huyết áp xâm lấn, lọc máu liên tục hoặc ECMO.',
            'Sởi viêm phổi có SpO2 thấp/thất bại oxy cannula, cần NCPAP/HFNC hoặc đặt nội khí quản; ARDS tiến triển nhanh; viêm não hoặc nhiễm khuẩn huyết.',
            'Viêm não/viêm màng não có GCS <10, co giật kéo dài, sốc, suy hô hấp, dấu tăng áp lực nội sọ hoặc cần thuốc vận mạch.'
          ]} />
          <ActionBlock color="purple" title="Theo dõi tại hồi sức" items={[
            'Monitor liên tục ECG, SpO2, nhịp thở, huyết áp; đặt huyết áp xâm lấn khi TCM độ 4 hoặc độ 3 có vận mạch/đặt nội khí quản.',
            'Đánh giá lại sau mỗi can thiệp: tri giác, da nổi bông/chi lạnh, mạch, HA, nước tiểu, ran phổi, SpO2, lactate/khí máu nếu có.',
            'Ghi rõ thời điểm bắt đầu oxy, thuốc, IVIG, vận mạch, đặt nội khí quản, lọc máu để đánh giá đáp ứng 30-60 phút, 1-2 giờ, 6 giờ, 12 giờ tùy bệnh cảnh.',
            'Chuẩn bị chuyển tuyến an toàn nếu cơ sở không đủ hồi sức nhi, lọc máu, ECMO hoặc chuyên khoa thần kinh/nhiễm.'
          ]} />
          <SourceNote items={['Bộ Y tế 2024: Tay chân miệng; Bộ Y tế 2025: Sởi; WHO 2025: Meningitis và Encephalitis.']} />
        </div>
      );
    }

    function AccordionItem({ title, type, children }) {
      const [isOpen, setIsOpen] = useState(false);
      const typeStyles = { danger: 'bg-red-500', warning: 'bg-orange-500', info: 'bg-blue-500' };

      return (
        <div className="border border-slate-200 rounded-lg overflow-hidden bg-white shadow-sm">
          <button 
            onClick={() => setIsOpen(!isOpen)}
            className="w-full p-4 text-left flex justify-between items-center bg-white hover:bg-slate-50 transition-colors"
          >
            <div className="flex items-center gap-3 min-w-0">
              <span className={`w-3 h-3 rounded-full flex-shrink-0 ${typeStyles[type] || 'bg-slate-500'}`}></span>
              <span className="font-semibold text-slate-800 leading-snug">{title}</span>
            </div>
            {isOpen ? <IconChevronUp size={20} className="text-slate-400 flex-shrink-0" /> : <IconChevronDown size={20} className="text-slate-400 flex-shrink-0" />}
          </button>
          {isOpen && <div className="p-4 border-t border-slate-100 bg-slate-50">{children}</div>}
        </div>
      );
    }

        { name: 'Morphin', group: 'An thần - giảm đau', diseases: ['Đau', 'Thở máy'], dose: 'TMC 0,1 mg/kg/liều; TTM 20-40 µg/kg/giờ', route: 'TMC/TTM', solvent: 'Dextrose 5%', note: 'Theo dõi suy hô hấp, tụt HA.' },
        { name: 'Rocuronium', group: 'An thần - giãn cơ', diseases: ['Đặt nội khí quản'], dose: 'TMC 0,6 mg/kg đặt NKQ; duy trì 0,3-0,6 mg/kg/giờ', route: 'TMC/TTM', solvent: 'Dextrose 5%', note: 'Chỉ dùng khi kiểm soát đường thở và an thần đầy đủ.' },
        { name: 'Acyclovir/Aciclovir', group: 'Kháng virus', diseases: ['Viêm não', 'HSV-1 encephalitis'], dose: 'Thường 10 mg/kg mỗi 8 giờ IV ở trẻ lớn/người lớn; trẻ nhỏ theo tuổi/phác đồ đơn vị', route: 'TMC/TTM', solvent: 'NaCl 0,9% hoặc Dextrose 5%', note: 'Dùng sớm khi nghi HSV/VZV hoặc viêm não chưa rõ nguyên nhân; chỉnh liều theo thận, bù dịch.' },
        { name: 'Ceftriaxone', group: 'Kháng sinh', diseases: ['Viêm màng não', 'Sởi biến chứng', 'Nhiễm khuẩn nặng', 'TCM độ 4 bội nhiễm/chưa loại trừ nhiễm khuẩn nặng'], dose: 'Trẻ ≥4 tuần: thường 50 mg/kg/liều mỗi 24 giờ, tối đa 2 g/liều. Viêm màng não/nhiễm khuẩn nặng: 50 mg/kg/liều mỗi 12 giờ, tối đa 2 g/liều, hoặc 100 mg/kg/liều mỗi 24 giờ, tối đa 4 g/ngày.', route: 'TMC/TTM', solvent: '-', note: 'Tránh ở sơ sinh/corrected GA thấp, vàng da hoặc đang dùng dung dịch chứa calci; chỉnh theo thận khi suy thận nặng. WHO meningitis: ceftriaxone hoặc cefotaxime là lựa chọn kinh nghiệm.' },
        { name: 'Cefotaxime', group: 'Kháng sinh', diseases: ['Viêm màng não', 'Sởi biến chứng', 'Nhiễm khuẩn nặng', 'TCM độ 4 bội nhiễm/chưa loại trừ nhiễm khuẩn nặng'], dose: 'Trẻ >4 tuần: 50 mg/kg/liều mỗi 6 giờ, tối đa 2 g/liều; viêm màng não có thể 200-225 mg/kg/ngày chia mỗi 6 giờ, theo phác đồ đơn vị.', route: 'TMC/TTM', solvent: '-', note: 'Ưu tiên hơn ceftriaxone ở sơ sinh khi cần cephalosporin thế hệ 3. Có trong phác đồ sởi biến chứng loét giác mạc/bội nhiễm và nghi viêm màng não.' },
        { name: 'Ceftazidime', group: 'Kháng sinh', diseases: ['Nhiễm khuẩn nặng', 'Pseudomonas'], dose: 'Trẻ ≥4 tuần: 50 mg/kg/liều mỗi 8 giờ, tối đa 2 g/liều; nhiễm rất nặng/Pseudomonas có thể cần liều cao theo ID. Chỉnh liều theo thận.', route: 'TTM/TMC', solvent: '-', note: 'Phủ Pseudomonas; không phải lựa chọn đơn độc cho viêm màng não cộng đồng nếu chưa rõ tác nhân.' },
        { name: 'Cefepime', group: 'Kháng sinh', diseases: ['Nhiễm khuẩn nặng', 'Pseudomonas'], dose: 'Trẻ ≥4 tuần: 50 mg/kg/liều mỗi 8 giờ, tối đa 2 g/liều. Chỉnh liều theo thận.', route: 'TTM/TMC', solvent: '-', note: 'Cephalosporin thế hệ 4; cân nhắc trong nhiễm Gram âm/Pseudomonas theo phác đồ đơn vị.' },
        { name: 'Ciprofloxacin', group: 'Kháng sinh', diseases: ['Nhiễm khuẩn nặng', 'Pseudomonas'], dose: 'Uống: 10-15 mg/kg/liều mỗi 12 giờ, tối đa 750 mg/liều. IV: 10 mg/kg/liều mỗi 8-12 giờ, tối đa 400 mg/liều. Chỉnh liều theo thận.', route: 'Uống/TM', solvent: '-', note: 'Chỉ dùng khi có chỉ định rõ/kháng sinh đồ hoặc dị ứng beta-lactam; cân nhắc nguy cơ gân, khớp, QT.' },
        { name: 'Levofloxacin', group: 'Kháng sinh', diseases: ['Nhiễm khuẩn nặng', 'Pseudomonas'], dose: '6 tháng-<5 tuổi: 10 mg/kg/liều mỗi 12 giờ. ≥5 tuổi: 10 mg/kg/liều mỗi 24 giờ, tối đa 750 mg/ngày. Chỉnh liều theo thận.', route: 'Uống/TM', solvent: '-', note: 'Dùng khi cần fluoroquinolone theo chỉ định/kháng sinh đồ; lưu ý QT, gân/khớp.' },
        { name: 'Ampicillin/Amoxicillin', group: 'Kháng sinh', diseases: ['Viêm màng não', 'Sởi biến chứng'], dose: 'Amoxicillin uống: 15-25 mg/kg/liều mỗi 8 giờ, tối đa 1 g/liều; nhiễm nặng 30 mg/kg/liều mỗi 8 giờ. Amoxicillin/Ampicillin IV: thường 25 mg/kg/liều mỗi 8 giờ; nhiễm nặng/viêm màng não 50 mg/kg/liều mỗi 4-6 giờ, tối đa 2 g/liều, theo ID/phác đồ.', route: 'Uống/TMC', solvent: '-', note: 'Sởi: viêm tai giữa dùng Amoxicillin hoặc Amoxicillin-clavulanic; WHO meningitis: thêm Ampicillin/Amoxicillin khi nguy cơ Listeria.' },
        { name: 'Amoxicillin-clavulanic', group: 'Kháng sinh', diseases: ['Sởi biến chứng', 'Viêm tai giữa', 'Loét giác mạc'], dose: 'Viêm mũi họng 15 mg/kg x 3 hoặc 25 mg/kg x 2; viêm phổi có thể 30 mg/kg x 3', route: 'Uống', solvent: '-', note: 'Sởi: dùng trong viêm tai giữa, loét giác mạc/loét miệng theo chỉ định.' },
        { name: 'Metronidazole', group: 'Kháng sinh', diseases: ['Sởi biến chứng', 'Loét miệng'], dose: 'Sởi loét miệng: 7,5 mg/kg/lần x 3 lần/ngày trong 5 ngày', route: 'Uống/TM', solvent: '-', note: 'Phối hợp Amoxicillin trong loét miệng theo BYT sởi 2025.' },
        { name: 'Vancomycin', group: 'Kháng sinh', diseases: ['Viêm màng não', 'Nhiễm khuẩn nặng'], dose: 'Trẻ ≥4 tuần: khởi đầu 15 mg/kg/liều mỗi 6 giờ, tối đa 750 mg/liều khởi đầu; hiệu chỉnh theo chức năng thận và TDM/AUC hoặc trough theo quy định đơn vị.', route: 'TTM', solvent: '-', note: 'Cân nhắc thêm khi vùng có phế cầu kháng penicillin/cephalosporin thế hệ 3 hoặc nghi MRSA. Luôn theo dõi nồng độ thuốc và độc tính thận.' },
        { name: 'Linezolid', group: 'Kháng sinh', diseases: ['Nhiễm khuẩn nặng', 'MRSA/VRE'], dose: '<12 tuổi: 10 mg/kg/liều mỗi 8 giờ. ≥12 tuổi: 600 mg mỗi 12 giờ. Có thể uống hoặc IV, sinh khả dụng uống cao.', route: 'Uống/TM', solvent: '-', note: 'Cân nhắc MRSA/VRE khi vancomycin không phù hợp hoặc theo kháng sinh đồ; theo dõi công thức máu, serotonin syndrome.' },
        { name: 'Colistin/Colistimethate sodium', group: 'Kháng sinh', diseases: ['Nhiễm khuẩn nặng', 'Gram âm đa kháng'], dose: 'Chỉ dùng theo ID/kháng sinh đồ. Gợi ý CMS: liều nạp và duy trì tính theo colistin base activity hoặc IU theo cân nặng và chức năng thận; bắt buộc kiểm tra quy đổi chế phẩm.', route: 'TTM/khí dung', solvent: '-', note: 'Nguy cơ độc thận/độc thần kinh cao; không tự quy đổi mg CMS ↔ CBA ↔ IU. Cần phác đồ đơn vị.' },
        { name: 'Azithromycin', group: 'Kháng sinh', diseases: ['Hô hấp'], dose: '10 mg/kg/ngày', route: 'Uống', solvent: '-', note: 'Theo nguồn Thuốc KH.' },
        { name: 'Amikacin', group: 'Kháng sinh', diseases: ['Nhiễm khuẩn nặng'], dose: 'Thường 15 mg/kg/liều mỗi 24 giờ IV/IM; nhiễm nặng có thể 15-20 mg/kg/liều mỗi 24 giờ tùy phác đồ. Hiệu chỉnh theo thận và TDM.', route: 'TTM/TMC', solvent: '-', note: 'Theo dõi thận, thính lực và nồng độ thuốc khi dùng kéo dài/nặng.' },
        { name: 'Gentamicin/Gentamycin', group: 'Kháng sinh', diseases: ['Nhiễm khuẩn nặng'], dose: 'Trẻ em thường 5-7,5 mg/kg/liều mỗi 24 giờ hoặc chia theo phác đồ; sơ sinh theo tuổi thai/tuổi sau sinh. Hiệu chỉnh theo thận và TDM.', route: 'TTM/TMC', solvent: '-', note: 'Theo dõi creatinine, thính lực và nồng độ thuốc. Tên trong file gốc: Gentamycin.' },
        { name: 'Meropenem', group: 'Kháng sinh', diseases: ['Viêm màng não', 'Nhiễm khuẩn nặng'], dose: 'Trẻ ≥3 tháng: thường 20 mg/kg/liều mỗi 8 giờ, tối đa 1 g/liều. Viêm màng não/nhiễm rất nặng/Pseudomonas: 40 mg/kg/liều mỗi 8 giờ, tối đa 2 g/liều. Chỉnh liều theo thận.', route: 'TTM', solvent: '-', note: 'Dùng theo kháng sinh đồ/khuyến cáo kiểm soát kháng sinh. Không phủ MRSA/Stenotrophomonas.' },
        { name: 'Imipenem-cilastatin', group: 'Kháng sinh', diseases: ['Nhiễm khuẩn nặng'], dose: 'Trẻ ≥3 tháng: thường 15-25 mg/kg/liều mỗi 6 giờ, tối đa 500 mg/liều hoặc 2 g/ngày; tránh/ thận trọng trong viêm màng não do nguy cơ co giật, ưu tiên meropenem nếu cần carbapenem CNS.', route: 'TTM', solvent: '-', note: 'Chỉnh liều theo thận; hội chẩn nhiễm/kháng sinh đồ khi dùng.' },
        { name: 'Mannitol', group: 'Khác', diseases: ['Viêm não', 'Tăng áp lực nội sọ', 'TCM độ 2b', 'TCM độ 4'], dose: '0,25-1 g/kg/liều mỗi 4-6 giờ, thường 1 g/kg trong 30 phút', route: 'TTM', solvent: '-', note: 'TCM: cân nhắc chống phù não ở độ 2b nhóm 2 hoặc độ 4 nếu có; theo dõi áp lực thẩm thấu, điện giải, nước tiểu.' },
        { name: 'Natri clorid 3%', group: 'Khác', diseases: ['TCM độ 2b', 'TCM độ 4', 'Tăng áp lực nội sọ'], dose: 'Dùng theo phác đồ tăng áp lực nội sọ/phù não của đơn vị; theo dõi Na+ máu và áp lực thẩm thấu.', route: 'TTM', solvent: '-', note: 'TCM độ 2b nhóm 2: là lựa chọn chống phù não thay/hoặc phối hợp theo chỉ định bên cạnh Mannitol, hạn chế dịch và đầu cao.' },
        { name: 'Furosemide', group: 'Khác', diseases: ['Phù phổi', 'Quá tải dịch', 'TCM độ 4'], dose: 'Uống 1-2 mg/kg/liều; TMC 1 mg/kg/liều', route: 'Uống/TMC', solvent: '-', note: 'Chỉ dùng khi phù phổi/quá tải dịch theo đánh giá hồi sức; theo dõi điện giải và nước tiểu.' },
        { name: 'Omeprazole', group: 'Khác', diseases: ['Bảo vệ dạ dày'], dose: 'Uống/TMC 1 mg/kg/liều; TTM 1 mg/kg/ngày', route: 'Uống/TMC/TTM', solvent: 'NaCl 0,9%', note: 'Theo chỉ định.' },
        { name: 'Dexamethasone', group: 'Corticoid', diseases: ['Viêm màng não', 'Croup', 'Sởi biến chứng'], dose: 'Theo bệnh cảnh; viêm màng não dùng cùng liều kháng sinh đầu nếu nghi vi khuẩn', route: 'TMC/TTM', solvent: '-', note: 'WHO meningitis: corticosteroid IV khởi cùng liều kháng sinh đầu trong nghi viêm màng não vi khuẩn ở bối cảnh phù hợp.' },
        { name: 'Hydrocortisone', group: 'Corticoid', diseases: ['Sốc', 'Viêm màng não'], dose: 'Theo chỉ định', route: 'TMC/TTM', solvent: '-', note: 'Có thể là corticosteroid thay thế trong một số bối cảnh.' },
        { name: 'Methylprednisolone', group: 'Corticoid', diseases: ['TCM sốt cao khó kiểm soát', 'Viêm não tự miễn/ADEM', 'Sởi biến chứng'], dose: 'TCM sốt >40°C thất bại: 10 mg/kg/lần IV chậm 30 phút x 2 lần/ngày, tối đa 3 ngày', route: 'TTM/TMC', solvent: '-', note: 'Viêm não tự miễn/ADEM dùng liều cao theo hội chẩn thần kinh.' },
        { name: 'IVIG/Gammaglobulin', group: 'Miễn dịch', diseases: ['TCM độ 2b', 'TCM độ 3', 'TCM độ 4', 'Sởi nặng', 'Viêm não tự miễn/ADEM'], dose: 'TCM: 1 g/kg/ngày truyền TM chậm 6-12 giờ, 1 liều duy nhất; chỉ dùng liều 2 sau 24 giờ nếu diễn biến nặng hơn.', route: 'TTM', solvent: '-', note: 'TCM độ 2b nhóm 2 dùng ngay; nhóm 1 chỉ xem xét nếu sau 6 giờ Phenobarbital không giảm triệu chứng/vẫn giật mình liên tục. Độ 4: sau hồi sức sốc và HATB ≥50 mmHg.' },
        { name: 'Vitamin A', group: 'Vitamin/kẽm', diseases: ['Sởi'], dose: '<6 tháng 50.000 IU/ngày; 6-12 tháng 100.000 IU/ngày; >12 tháng 200.000 IU/ngày', route: 'Uống', solvent: '-', note: 'Sởi: dùng liều cao, thường 2 ngày liên tiếp; cân nhắc nhắc lại theo nguy cơ thiếu vitamin A/suy dinh dưỡng.' },
        { name: 'Zinc', group: 'Vitamin/kẽm', diseases: ['Tiêu chảy'], dose: '<6 tháng 1 viên x 1 lần/ngày; >6 tháng 2 viên x 1 lần/ngày', route: 'Uống', solvent: '-', note: 'Theo nguồn Thuốc KH.' },
        { name: 'N-Acetylcysteine', group: 'Khác', diseases: ['Ngộ độc paracetamol'], dose: 'Liều truyền theo phác đồ 3 giai đoạn', route: 'TTM', solvent: 'Dextrose 5%', note: 'Theo nguồn Thuốc KH.' },

        { name: 'Paracetamol', group: 'Hạ sốt - giảm đau', diseases: ['Tay chân miệng', 'TCM độ 1', 'TCM độ 2a', 'TCM độ 2b', 'TCM độ 3', 'Sốt cao khó kiểm soát', 'Đau'], dose: '10-15 mg/kg/lần uống hoặc đặt hậu môn mỗi 4-6 giờ; TCM hạ sốt tích cực: 10-15 mg/kg/lần truyền TM chậm 15 phút.', route: 'Uống/đặt hậu môn/TM', solvent: '-', note: 'TCM: tổng liều tối đa Paracetamol 60 mg/kg/ngày khi dùng xen kẽ Ibuprofen. Tránh quá liều, lưu ý bệnh gan.' },
        { name: 'Ibuprofen', group: 'Hạ sốt - giảm đau', diseases: ['Tay chân miệng', 'TCM độ 1', 'TCM độ 2a', 'Sốt cao khó kiểm soát', 'Đau'], dose: '5-10 mg/kg/lần uống mỗi 6-8 giờ khi sốt cao/đau; tối đa 40 mg/kg/ngày.', route: 'Uống', solvent: '-', note: 'TCM: có thể phối hợp/xen kẽ với Paracetamol khi sốt cao không đáp ứng tốt. Không dùng Aspirin; thận trọng mất nước, suy thận, xuất huyết tiêu hóa.' },
        { name: 'Prostaglandin E1 (Alprostadil/PGE1)', group: 'Tim mạch', diseases: ['Tim bẩm sinh phụ thuộc ống động mạch', 'Sốc tim'], dose: 'Thường 10 ng/kg/phút = 0,01 µg/kg/phút TTM; chỉnh theo đáp ứng và tác dụng phụ.', route: 'TTM', solvent: 'Dextrose 5%', note: 'Theo Thuốc KH: CN x 30 = số µg thuốc pha trong D5% đủ 50 ml; ml/giờ = 0,1 x liều ng/kg/phút. Theo dõi ngưng thở, tụt HA, sốt.' },
        { name: 'Clindamycin', group: 'Kháng sinh', diseases: ['Nhiễm khuẩn da mô mềm', 'MRSA cộng đồng', 'Nhiễm khuẩn kỵ khí'], dose: 'Trẻ em thường 10-25 mg/kg/ngày chia mỗi 8 giờ; nhiễm trung bình-nặng 30-40 mg/kg/ngày chia mỗi 6-8 giờ.', route: 'Uống/TM', solvent: 'NaCl 0,9%', note: 'Theo Thuốc KH: TTM pha loãng nồng độ ≤18 mg/ml trong 60 phút. Cân nhắc C. difficile và kháng sinh đồ.' },
        { name: 'Huyết thanh kháng nọc độc rắn', group: 'Giải độc - huyết thanh', diseases: ['Rắn cắn', 'Sốc phản vệ nguy cơ'], dose: 'Liều tùy loại rắn và mức độ nhiễm độc; ví dụ nguồn Thuốc KH ghi rắn lục tre 6 lọ pha NS 50-100 ml truyền 1 giờ.', route: 'TTM', solvent: 'NaCl 0,9%', note: 'Theo Thuốc KH: test trong da 0,2 ml, đọc sau 15 phút; chuẩn bị adrenaline 1‰ 0,01 ml/kg TDD trước/trong xử trí phản vệ theo phác đồ.' },
        { name: 'Zentomyces', group: 'Men vi sinh - tiêu hóa', diseases: ['Tiêu chảy'], dose: '1 gói x 2-3 lần/ngày.', route: 'Uống', solvent: '-', note: 'Theo nguồn Thuốc KH.' },
        { name: 'L-Bio', group: 'Men vi sinh - tiêu hóa', diseases: ['Tiêu chảy'], dose: '1 gói x 3 cữ/ngày.', route: 'Uống', solvent: '-', note: 'Theo nguồn Thuốc KH.' },
        { name: 'Varogel', group: 'Tiêu hóa - niêm mạc', diseases: ['Loét miệng', 'Đau miệng', 'Tay chân miệng', 'TCM độ 1', 'TCM độ 2a'], dose: '1/3 gói x 3 lần/ngày, ngậm miệng.', route: 'Ngậm/uống', solvent: '-', note: 'Theo nguồn Thuốc KH.' },
        { name: 'Rectiofar', group: 'Tiêu hóa - thụt tháo', diseases: ['Táo bón'], dose: 'Trẻ nhỏ <5 tuổi: 2-3 ống x 2 lần; trẻ lớn >7 tuổi: 5 ống x 2 lần.', route: 'Bơm hậu môn', solvent: '-', note: 'Theo nguồn Thuốc KH; dùng theo đánh giá lâm sàng, tránh lạm dụng.' },
        { name: 'Chlorpheniramine 4 mg', group: 'Khác', diseases: ['Dị ứng'], dose: '<2 tuổi 1 mg x2; 2-6 tuổi 1 mg x4; 6-12 tuổi 2 mg x4; >12 tuổi 4 mg x4', route: 'Uống', solvent: '-', note: 'Theo nguồn Thuốc KH.' }
      ];
